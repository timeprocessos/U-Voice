<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>U-Voice | Hub de Experiência</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #FDFDFE; margin: 0; padding: 0; text-align: left; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        const BRAND = {
            sand1: '#FBFAF3', sand2: '#F0EEE6', sand7: '#1F1D1A', white: '#FFFFFF',
            black: '#000000', primaryButton: '#397394', teaGreen: '#BED993',
            sunflower: '#FDC256', coral: '#F77D8D', sky: '#82B3D0', cherryRed: '#D22B2B'
        };

        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => { lucide.createIcons(); }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const UnicoLogo = () => (
            <svg width="34" height="34" viewBox="0 0 100 100" fill="none">
                <path d="M20 20V55C20 71.5685 33.4315 85 50 85C66.5685 85 80 71.5685 80 55V20H65V55C65 63.2843 58.2843 70 50 70C41.7157 70 35 63.2843 35 55V20H20Z" fill="currentColor"/>
            </svg>
        );

        function StatCard({ title, value, iconName, color }) {
            const styles = {
                blue: { bg: BRAND.white, accent: BRAND.sky, text: BRAND.black },
                purple: { bg: BRAND.sand7, accent: '#A281CF', text: BRAND.white },
                emerald: { bg: BRAND.sand1, accent: BRAND.teaGreen, text: BRAND.black },
                rose: { bg: BRAND.white, accent: BRAND.coral, text: BRAND.black }
            };
            const current = styles[color] || styles.blue;
            return (
                <div className="p-6 rounded-[2.5rem] border border-slate-100 shadow-sm" style={{ backgroundColor: current.bg }}>
                    <div className="p-3 rounded-2xl border w-fit mb-4" style={{ borderColor: BRAND.sand2, color: current.accent }}>
                        <Icon name={iconName} size={20} />
                    </div>
                    <h3 className="text-4xl font-black tracking-tighter" style={{ color: current.text }}>{value}</h3>
                    <div className="text-[10px] font-black uppercase tracking-widest mt-2 opacity-40" style={{ color: current.text }}>{title}</div>
                </div>
            );
        }

        function App() {
            const [activeTab, setActiveTab] = useState('comunicados');
            const comms = [
                { id: 1, title: 'Newsletter de Cultura Q1', channel: 'Slack', date: '01/03/2026', engajamento: 39.7 },
                { id: 2, title: 'Atualização de Benefícios', channel: 'E-mail', date: '28/02/2026', engajamento: 0 }
            ];

            return (
                <div className="min-h-screen pb-24 text-left">
                    <nav className="bg-white border-b px-10 py-6 flex justify-between items-center sticky top-0 z-50">
                        <div className="flex items-center gap-12">
                            <div className="flex items-center gap-4">
                                <div className="w-12 h-12 bg-black rounded-2xl flex items-center justify-center text-white"><UnicoLogo /></div>
                                <div>
                                    <h1 className="text-2xl font-black italic uppercase leading-none">U - Voice</h1>
                                    <p className="text-[8px] font-black uppercase text-slate-400 tracking-[0.4em] mt-1">Experience Hub</p>
                                </div>
                            </div>
                            <div className="flex bg-slate-100 p-1 rounded-full gap-2">
                                {['comunicados', 'impacto', 'agenda'].map(tab => (
                                    <button key={tab} onClick={() => setActiveTab(tab)} className={`px-6 py-2 rounded-full text-[10px] font-black uppercase ${activeTab === tab ? 'bg-black text-white' : 'text-slate-400'}`}>
                                        {tab}
                                    </button>
                                ))}
                            </div>
                        </div>
                    </nav>

                    <main className="max-w-7xl mx-auto px-10 py-16">
                        <header className="mb-16">
                            <h2 className="text-8xl font-black tracking-tighter italic">by the numbers.</h2>
                            <p className="text-slate-400 font-black uppercase text-sm tracking-[0.4em] mt-4">Unico Operações • Inteligência Estratégica</p>
                        </header>

                        {activeTab === 'impacto' && (
                            <div className="grid grid-cols-1 md:grid-cols-4 gap-6">
                                <StatCard title="Posts no Mês" value="3" iconName="file-text" color="blue" />
                                <StatCard title="Total Interações" value="1.240" iconName="trending-up" color="purple" />
                                <StatCard title="Score eNPS" value="56" iconName="smile" color="rose" />
                                <StatCard title="Clima & Pulso" value="83%" iconName="zap" color="emerald" />
                            </div>
                        )}

                        {activeTab === 'comunicados' && (
                            <div className="bg-white rounded-[2.5rem] border shadow-sm overflow-hidden">
                                <table className="w-full text-left">
                                    <thead>
                                        <tr className="text-slate-400 text-[10px] uppercase font-black border-b bg-slate-50">
                                            <th className="px-8 py-6">Título</th>
                                            <th className="px-8 py-6">Canal</th>
                                            <th className="px-8 py-6 text-right">Score</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {comms.map(c => (
                                            <tr key={c.id} className="border-b last:border-none">
                                                <td className="px-8 py-6 font-black uppercase italic text-lg">{c.title}</td>
                                                <td className="px-8 py-6 text-[10px] font-black text-slate-400">{c.channel}</td>
                                                <td className="px-8 py-6 text-right font-black text-[#397394]">{c.engajamento}%</td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
