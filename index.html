<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>U-Voice | Hub de Operações</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&display=swap');
        
        :root {
            --primary-blue: #397394;
            --accent-green: #BED993;
            --bg-main: #FDFDFE;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg-main); 
            margin: 0; 
            padding: 0; 
            color: #1e293b;
            -webkit-font-smoothing: antialiased;
        }

        /* Custom Scrollbar */
        .custom-scroll::-webkit-scrollbar { width: 4px; height: 4px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #E2E8F0; border-radius: 10px; }
        
        /* Animations */
        .modal-animate { animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Component Styles */
        .impact-filter { 
            background: white; 
            border: 1px solid #F1F5F9; 
            border-radius: 12px; 
            padding: 8px 16px; 
            font-size: 10px; 
            font-weight: 800; 
            text-transform: uppercase; 
            color: #64748b; 
            outline: none; 
            transition: all 0.2s; 
            cursor: pointer; 
            appearance: none;
        }
        .impact-filter:hover { border-color: var(--primary-blue); color: var(--primary-blue); }
        
        .row-green-effect { 
            border-left: 5px solid var(--accent-green) !important; 
            background: linear-gradient(90deg, rgba(190, 217, 147, 0.08) 0%, rgba(255, 255, 255, 0) 100%); 
        }

        .btn-close-modal { 
            position: absolute; top: 1.5rem; right: 1.5rem; background: #000; color: #fff; 
            width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; 
            justify-content: center; z-index: 170; transition: all 0.3s; 
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.15); border: 2px solid rgba(255,255,255,0.1); 
        }
        .btn-close-modal:hover { transform: scale(1.1) rotate(90deg); background: #ef4444; }

        .checkbox-flag { 
            display: flex; align-items: center; gap: 8px; padding: 10px 16px; 
            background: #f8fafc; border: 1.5px solid #e2e8f0; border-radius: 14px; 
            cursor: pointer; transition: all 0.2s; font-size: 10px; font-weight: 800; 
            text-transform: uppercase; user-select: none;
        }
        .checkbox-flag.active { background: var(--primary-blue); color: white; border-color: var(--primary-blue); box-shadow: 0 4px 12px rgba(57, 115, 148, 0.2); }
        
        .status-pill { padding: 4px 14px; border-radius: 99px; font-size: 9px; font-weight: 900; text-transform: uppercase; display: inline-flex; align-items: center; gap: 4px; }
        .status-sent { background: #ecfdf5; color: #059669; }
        .status-pending { background: #fffbeb; color: #d97706; }
        .status-canceled { background: #fef2f2; color: #dc2626; }
        
        .card-decision { transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); border: 2.5px solid transparent; cursor: pointer; }
        .shadow-glow-green { box-shadow: 0 0 25px rgba(190, 217, 147, 0.3); }

        .message-box { 
            position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); 
            background: #0f172a; color: white; padding: 14px 28px; border-radius: 16px; 
            z-index: 1000; font-weight: 800; font-size: 10px; text-transform: uppercase; 
            letter-spacing: 0.15em; box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            animation: slideUp 0.3s forwards;
        }

        /* Glassmorphism for inputs */
        .glass-input {
            background: rgba(248, 250, 252, 0.8);
            backdrop-filter: blur(4px);
            border: 1px solid #e2e8f0;
            transition: all 0.2s;
        }
        .glass-input:focus {
            background: #fff;
            border-color: var(--primary-blue);
            ring: 4px rgba(57, 115, 148, 0.1);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInAnonymously, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, onSnapshot, deleteDoc, addDoc, updateDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Firebase Configuration from Environment
        const firebaseConfig = JSON.parse(__firebase_config);
        const firebaseApp = initializeApp(firebaseConfig);
        const auth = getAuth(firebaseApp);
        const db = getFirestore(firebaseApp);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'u-voice-v26-gold';

        const { useState, useEffect, useMemo, useRef } = React;

        // --- CONSTANTES ---
        const EDITORIAS_LIST = ["Originais Unico", "Career Ops", "The Ops Playbook", "The Ops Story"];
        const FORMATOS_LIST = ["Vídeo", "Imagem", "GIF", "Texto", "Slide", "PDF", "Repost"];
        const STATUS_OPTIONS = ["Aguardando Envio", "Enviado", "Cancelado"];
        const MESES_MAP = [
            { label: "Janeiro", val: "0" }, { label: "Fevereiro", val: "1" }, { label: "Março", val: "2" },
            { label: "Abril", val: "3" }, { label: "Maio", val: "4" }, { label: "Junho", val: "5" },
            { label: "Julho", val: "6" }, { label: "Agosto", val: "7" }, { label: "Setembro", val: "8" },
            { label: "Outubro", val: "9" }, { label: "Novembro", val: "10" }, { label: "Dezembro", val: "11" }
        ];
        const MESES_ABREV = ["JAN", "FEV", "MAR", "ABR", "MAI", "JUN", "JUL", "AGO", "SET", "OUT", "NOV", "DEZ"];
        const ANALYSTS_LIST = ["Ariel Mori Dell Aringa", "Diego Francisco Rocha"];
        const CHANNELS_LIST = ["#news-ops-all-team", "#news-cx-team", "#news-analysis-team", "#news-onboarding-team", "#news-ops-leaders"];

        // --- COMPONENTES ---
        const Icon = ({ name, size = 18, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    window.lucide.createIcons({ attrs: { class: className, style: `width: ${size}px; height: ${size}px;` }, name: name });
                }
            }, [name, size, className]);
            return <span ref={iconRef} className="inline-flex items-center justify-center"><i data-lucide={name}></i></span>;
        };

        const UnicoLogo = ({ size = 34 }) => (
            <div className="bg-black rounded-xl flex items-center justify-center shadow-lg transform transition-transform hover:scale-105" style={{ width: size, height: size }}>
                <svg width={size * 0.6} height={size * 0.6} viewBox="0 0 100 100" fill="none">
                    <path d="M20 20V55C20 71.5685 33.4315 85 50 85C66.5685 85 80 71.5685 80 55V20H65V55C65 63.2843 58.2843 70 50 70C41.7157 70 35 63.2843 35 55V20H20Z" fill="white"/>
                </svg>
            </div>
        );

        const SimpleBarChart = ({ data, title, color = "#397394" }) => {
            const maxVal = Math.max(...Object.values(data), 1);
            return (
                <div className="bg-white p-8 rounded-[2.5rem] border border-slate-100 shadow-sm w-full">
                    <h4 className="text-[10px] font-black uppercase text-slate-400 mb-6 tracking-[0.2em] italic">{title}</h4>
                    <div className="space-y-5">
                        {Object.entries(data).map(([key, val]) => (
                            <div key={key} className="space-y-2">
                                <div className="flex justify-between text-[9px] font-black uppercase text-slate-600">
                                    <span>{key}</span>
                                    <span className="text-slate-400">{val}</span>
                                </div>
                                <div className="h-2.5 bg-slate-50 rounded-full overflow-hidden">
                                    <div className="h-full rounded-full transition-all duration-1000 ease-out" 
                                         style={{ width: `${(val/maxVal)*100}%`, backgroundColor: color }}></div>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        const LineAreaChart = ({ data, title, color = "#397394", valueSuffix = "" }) => {
            const chartHeight = 240; 
            const chartWidth = 800;
            const paddingX = 40; 
            const paddingY = 60;
            const values = Object.values(data);
            const maxVal = Math.max(...values, 1) * 1.3;
            const keys = Object.keys(data);
            
            const points = keys.map((key, i) => {
                const x = (i * (chartWidth - paddingX * 2)) / (keys.length - 1) + paddingX;
                const y = chartHeight - ((data[key] / maxVal) * (chartHeight - paddingY * 2)) - paddingY;
                return { x, y, val: data[key], label: key };
            });

            const linePath = points.map((p, i) => `${i === 0 ? 'M' : 'L'} ${p.x} ${p.y}`).join(' ');
            const areaPath = `${linePath} L ${points[points.length-1].x} ${chartHeight - paddingY} L ${points[0].x} ${chartHeight - paddingY} Z`;

            return (
                <div className="bg-white p-8 rounded-[3rem] border border-slate-100 shadow-sm w-full">
                    <h4 className="text-[11px] font-black uppercase text-slate-400 mb-10 tracking-[0.2em] italic">{title}</h4>
                    <div className="relative w-full overflow-x-auto custom-scroll pb-6">
                        <svg viewBox={`0 0 ${chartWidth} ${chartHeight}`} className="w-full min-w-[700px] h-auto overflow-visible">
                            {[0, 0.5, 1].map((p, i) => (
                                <line key={i} x1={paddingX} y1={chartHeight - paddingY - p * (chartHeight - paddingY * 2)} 
                                      x2={chartWidth - paddingX} y2={chartHeight - paddingY - p * (chartHeight - paddingY * 2)} 
                                      stroke="#F1F5F9" strokeWidth="2" strokeDasharray="6 6" />
                            ))}
                            <path d={areaPath} fill={color} fillOpacity="0.08" />
                            <path d={linePath} fill="none" stroke={color} strokeWidth="5" strokeLinecap="round" strokeLinejoin="round" />
                            {points.map((p, i) => (
                                <g key={i}>
                                    <circle cx={p.x} cy={p.y} r="7" fill="white" stroke={color} strokeWidth="4" className="filter drop-shadow-sm" />
                                    <text x={p.x} y={p.y - 25} textAnchor="middle" className="font-black" style={{ fontSize: '13px', fill: '#0f172a' }}>{p.val}{valueSuffix}</text>
                                    <text x={p.x} y={chartHeight - 15} textAnchor="middle" className="font-bold text-slate-400 uppercase" style={{ fontSize: '9px' }}>{p.label}</text>
                                </g>
                            ))}
                        </svg>
                    </div>
                </div>
            );
        }

        // --- APP PRINCIPAL ---
        function App() {
            const [user, setUser] = useState(null);
            const [activeTab, setActiveTab] = useState('comunicados');
            const [comms, setComms] = useState([]);
            const [agenda, setAgenda] = useState([]);
            const [message, setMessage] = useState("");
            const [isLoading, setIsLoading] = useState(true);
            
            // Modais e Edição
            const [isModalCommOpen, setIsModalCommOpen] = useState(false);
            const [isModalAgendaOpen, setIsModalAgendaOpen] = useState(false);
            const [editingComm, setEditingComm] = useState(null);
            const [editingAgenda, setEditingAgenda] = useState(null);

            // Estados de Formulário
            const [channelsList, setChannelsList] = useState(CHANNELS_LIST);
            const [availableAnalysts, setAvailableAnalysts] = useState(ANALYSTS_LIST);
            const [selectedAnalysts, setSelectedAnalysts] = useState([]);
            const [selectedFormats, setSelectedFormats] = useState([]);
            const [localBudget, setLocalBudget] = useState(0);
            const [hasCoffee, setHasCoffee] = useState(false);
            const [vendorToggle, setVendorToggle] = useState(false);
            const [selectedVendorIdx, setSelectedVendorIdx] = useState(null);
            const [localVendors, setLocalVendors] = useState([{ name: '', value: 0 }, { name: '', value: 0 }, { name: '', value: 0 }]);

            // Filtros
            const [filterAnalyst, setFilterAnalyst] = useState("Todos");
            const [filterYear, setFilterYear] = useState("2026");
            const [filterMonth, setFilterMonth] = useState("Todos");
            const [filterChannel, setFilterChannel] = useState("Todos Canais");
            const [filterEditoria, setFilterEditoria] = useState("Todas");

            // 1. Auth Init
            useEffect(() => {
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }
                    } catch (e) {
                        console.error("Firebase auth error:", e);
                    }
                };
                initAuth();
                const unsubscribeAuth = onAuthStateChanged(auth, (u) => {
                    setUser(u);
                    if (u) {
                        setMessage("Conexão Segura Ativa");
                        setIsLoading(false);
                    }
                });
                return () => unsubscribeAuth();
            }, []);

            // 2. Data Sync
            useEffect(() => {
                if (!user) return;
                
                const commsRef = collection(db, 'artifacts', appId, 'public', 'data', 'comms');
                const unsubC = onSnapshot(commsRef, (snap) => {
                    setComms(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                }, (err) => console.error("Sync Error Comms:", err));
                
                const agendaRef = collection(db, 'artifacts', appId, 'public', 'data', 'agenda');
                const unsubA = onSnapshot(agendaRef, (snap) => {
                    setAgenda(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                }, (err) => console.error("Sync Error Agenda:", err));
                
                return () => { unsubC(); unsubA(); };
            }, [user]);

            // Mensagem Temporária
            useEffect(() => {
                if (message) {
                    const timer = setTimeout(() => setMessage(""), 3500);
                    return () => clearTimeout(timer);
                }
            }, [message]);

            // Lógica de Negócio
            const calculateScore = (reactions = 0, comments = 0, population = 0) => {
                if (!population || population <= 0) return 0;
                return ((((Number(reactions) * 1) + (Number(comments) * 2)) / Number(population)) * 100).toFixed(1);
            };

            const toggleAnalyst = (name) => setSelectedAnalysts(prev => prev.includes(name) ? prev.filter(n => n !== name) : [...prev, name]);
            const addNewAnalyst = () => {
                const name = prompt("Nome do novo analista:");
                if (name && !availableAnalysts.includes(name)) {
                    setAvailableAnalysts([...availableAnalysts, name]);
                }
            };
            const toggleFormat = (f) => setSelectedFormats(prev => prev.includes(f) ? prev.filter(item => item !== f) : [...prev, f]);

            // CRUD Handlers
            const handleSaveComm = async (e) => {
                e.preventDefault();
                if (!user) return;
                const fd = new FormData(e.target);
                const data = {
                    title: fd.get('title'), 
                    channelName: fd.get('channelName'),
                    date: fd.get('date'), 
                    postTime: fd.get('postTime'), 
                    editoria: fd.get('editoria'),
                    analysts: selectedAnalysts, 
                    formats: selectedFormats, 
                    medium: fd.get('medium') || 'Slack', 
                    status: fd.get('status'),
                    population: fd.get('population') ? Number(fd.get('population')) : 0, 
                    views: Number(fd.get('views') || 0),
                    reactions: Number(fd.get('reactions') || 0), 
                    comments: Number(fd.get('comments') || 0), 
                    updatedAt: new Date().toISOString()
                };

                setIsModalCommOpen(false);
                try {
                    if (editingComm) await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'comms', editingComm.id), data);
                    else await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'comms'), data);
                    setMessage("Comunicado registrado!");
                } catch (err) { setMessage("Erro ao salvar."); }
            };

            const handleSaveAgenda = async (e) => {
                e.preventDefault();
                if (!user) return;
                const fd = new FormData(e.target);
                const data = {
                    title: fd.get('atividade'), date: fd.get('date'), sponsor: fd.get('sponsor'), description: fd.get('description'),
                    status: fd.get('status'), budget: localBudget, hasCoffee: hasCoffee, hasVendor: vendorToggle,
                    selectedVendorIdx: selectedVendorIdx !== null ? selectedVendorIdx : -1,
                    vendor1: localVendors[0].name, vendorValue1: localVendors[0].value,
                    vendor2: localVendors[1].name, vendorValue2: localVendors[1].value,
                    vendor3: localVendors[2].name, vendorValue3: localVendors[2].value, updatedAt: new Date().toISOString()
                };
                setIsModalAgendaOpen(false);
                try {
                    if (editingAgenda) await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'agenda', editingAgenda.id), data);
                    else await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'agenda'), data);
                    setMessage("Planeamento salvo!");
                } catch (err) { setMessage("Erro ao processar."); }
            };

            const openCommModal = (c = null) => {
                setEditingComm(c);
                setSelectedAnalysts(c ? (c.analysts || []) : []);
                setSelectedFormats(c ? (c.formats || []) : []);
                setIsModalCommOpen(true);
            };

            const openAgendaModal = (ev = null) => {
                if (ev) {
                    setEditingAgenda(ev); setLocalBudget(Number(ev.budget || 0)); setHasCoffee(ev.hasCoffee || false);
                    setVendorToggle(ev.hasVendor || false); setSelectedVendorIdx(ev.selectedVendorIdx >= 0 ? ev.selectedVendorIdx : null);
                    setLocalVendors([
                        { name: ev.vendor1 || '', value: Number(ev.vendorValue1 || 0) },
                        { name: ev.vendor2 || '', value: Number(ev.vendorValue2 || 0) },
                        { name: ev.vendor3 || '', value: Number(ev.vendorValue3 || 0) }
                    ]);
                } else {
                    setEditingAgenda(null); setLocalBudget(0); setHasCoffee(false); setVendorToggle(false); setSelectedVendorIdx(null);
                    setLocalVendors([{ name: '', value: 0 }, { name: '', value: 0 }, { name: '', value: 0 }]);
                }
                setIsModalAgendaOpen(true);
            };

            // Filtragem e Stats
            const filteredComms = useMemo(() => {
                return comms.filter(c => {
                    const d = new Date(c.date);
                    const analystMatch = filterAnalyst === "Todos" || (c.analysts && c.analysts.includes(filterAnalyst));
                    const yearMatch = d.getFullYear().toString() === filterYear;
                    const monthMatch = filterMonth === "Todos" || d.getMonth().toString() === filterMonth;
                    const channelMatch = filterChannel === "Todos Canais" || c.channelName === filterChannel;
                    const editoriaMatch = filterEditoria === "Todas" || c.editoria === filterEditoria;
                    return analystMatch && yearMatch && monthMatch && channelMatch && editoriaMatch;
                }).sort((a, b) => new Date(b.date) - new Date(a.date));
            }, [comms, filterAnalyst, filterYear, filterMonth, filterChannel, filterEditoria]);

            const statsImpacto = useMemo(() => {
                const sent = comms.filter(c => c.status === 'Enviado' && new Date(c.date).getFullYear().toString() === filterYear);
                const totalPosts = sent.length;
                const interactions = sent.reduce((acc, c) => acc + (Number(c.reactions) || 0) + (Number(c.comments) || 0), 0);
                const totalComments = sent.reduce((acc, c) => acc + (Number(comments) || 0), 0);
                const scoreSum = sent.reduce((acc, c) => acc + Number(calculateScore(c.reactions, c.comments, c.population)), 0);
                const avgScore = totalPosts > 0 ? (scoreSum / totalPosts).toFixed(1) : "0.0";
                
                const formatDist = FORMATOS_LIST.reduce((acc, f) => { acc[f] = sent.filter(c => c.formats?.includes(f)).length; return acc; }, {});
                const editoriaDist = EDITORIAS_LIST.reduce((acc, ed) => { acc[ed] = sent.filter(c => c.editoria === ed).length; return acc; }, {});
                
                const monthlyPosts = {}; const monthlyEngagement = {};
                MESES_ABREV.forEach((mes, idx) => {
                    const mPosts = sent.filter(c => new Date(c.date).getMonth() === idx);
                    monthlyPosts[mes] = mPosts.length;
                    if (mPosts.length > 0) monthlyEngagement[mes] = (mPosts.reduce((acc, c) => acc + Number(calculateScore(c.reactions, c.comments, c.population)), 0) / mPosts.length).toFixed(1);
                    else monthlyEngagement[mes] = 0;
                });
                return { totalPosts, interactions, totalComments, avgScore, formatDist, editoriaDist, monthlyPosts, monthlyEngagement };
            }, [comms, filterYear]);

            if (isLoading) return <div className="h-screen flex items-center justify-center bg-slate-50"><div className="animate-spin text-slate-900"><Icon name="loader-2" size={40} /></div></div>;

            return (
                <div className="min-h-screen pb-40">
                    {message && <div className="message-box">{message}</div>}
                    
                    {/* NAVBAR */}
                    <nav className="bg-white/80 backdrop-blur-xl border-b border-slate-100 px-6 sm:px-12 py-5 flex justify-between items-center sticky top-0 z-50">
                        <div className="flex items-center gap-4">
                            <UnicoLogo size={42} />
                            <h1 className="text-2xl font-black italic uppercase tracking-tighter leading-none text-slate-900">U-Voice</h1>
                        </div>
                        <div className="flex bg-slate-100/80 p-1.5 rounded-full gap-1 shadow-inner">
                            {['comunicados', 'agenda', 'impacto'].map(tab => (
                                <button key={tab} onClick={() => setActiveTab(tab)} 
                                        className={`px-8 py-2.5 rounded-full text-[10px] font-black uppercase transition-all whitespace-nowrap ${activeTab === tab ? 'bg-black text-white shadow-lg' : 'text-slate-400 hover:text-slate-600'}`}>
                                    {tab}
                                </button>
                            ))}
                        </div>
                    </nav>

                    <main className="max-w-7xl mx-auto px-6 sm:px-12 py-12">
                        {/* HEADER DINÂMICO */}
                        <header className="mb-16">
                            <h2 className="text-6xl sm:text-9xl font-black italic tracking-tighter leading-none text-slate-900 uppercase">
                                {activeTab === 'comunicados' ? 'flow.feed' : activeTab === 'agenda' ? 'next.steps' : 'impact.metrics'}
                            </h2>
                            <p className="text-slate-400 font-black uppercase text-[11px] tracking-[0.5em] mt-6 ml-2 italic flex items-center gap-3">
                                <span className="w-12 h-[2px] bg-slate-200"></span>
                                Gestão Estratégica Operacional
                            </p>
                        </header>

                        {/* TABS CONTENT */}
                        {activeTab === 'comunicados' && (
                            <div className="space-y-10 fade-in">
                                {/* FILTROS */}
                                <div className="flex flex-wrap items-center gap-4 bg-white p-5 rounded-[2.5rem] border border-slate-100 shadow-sm">
                                    <div className="flex items-center gap-2 px-5 py-2.5 bg-slate-50 rounded-2xl text-slate-400 border border-slate-100">
                                        <Icon name="filter" size={14} /><span className="text-[10px] font-black uppercase">Filtros</span>
                                    </div>
                                    <select value={filterAnalyst} onChange={(e) => setFilterAnalyst(e.target.value)} className="impact-filter"><option>Todos</option>{availableAnalysts.map(a => <option key={a}>{a}</option>)}</select>

                                            <input type="number" step="0.01" value={localBudget} onChange={(e) => setLocalBudget(Number(e.target.value))} className="w-full bg-white border-none rounded-2xl px-8 py-6 font-black text-4xl text-[#397394] outline-none shadow-sm" placeholder="0,00" />
                                        </div>

                                        <div className="space-y-2">
                                            <label className="text-[10px] font-black uppercase text-slate-400 block tracking-widest italic ml-1">Pauta e Detalhes</label>
                                            <textarea name="description" defaultValue={editingAgenda?.description} className="w-full h-48 bg-white border-none rounded-3xl p-8 font-medium text-slate-600 outline-none resize-none leading-relaxed shadow-sm" placeholder="Documente aqui a proposta estratégica..."></textarea>
                                        </div>
                                    </div>

                                    <div className="lg:col-span-7 bg-slate-900 rounded-[4.5rem] p-16 shadow-2xl flex flex-col justify-between self-stretch">
                                        <div className="space-y-12">
                                            <div className="flex justify-between items-center border-b border-white/10 pb-10">
                                                <div className="text-[11px] font-black uppercase text-white tracking-[0.4em] flex items-center gap-4 italic">
                                                    <div className="w-3 h-3 rounded-full bg-amber-400 shadow-[0_0_15px_rgba(251,191,36,0.5)]"></div> Mesa de Cotação
                                                </div>
                                                <div className="flex items-center gap-5 bg-white/5 p-4 rounded-full border border-white/10 px-8">
                                                    <span className="text-[9px] font-black text-slate-500 uppercase tracking-widest italic">Terceirizado?</span>
                                                    <button type="button" onClick={() => setVendorToggle(!vendorToggle)} className={`w-16 h-8 rounded-full relative transition-all duration-500 ${vendorToggle ? 'bg-[#BED993]' : 'bg-slate-700'}`}>
                                                        <div className={`absolute top-1 left-1 w-6 h-6 rounded-full bg-white shadow-xl transition-all duration-500 ${vendorToggle ? 'translate-x-8' : ''}`}></div>
                                                    </button>
                                                </div>
                                            </div>

                                            {vendorToggle ? (
                                                <div className="space-y-8 fade-in">
                                                    {[0, 1, 2].map(i => {
                                                        const diff = localBudget - localVendors[i].value;
                                                        const percent = localBudget > 0 ? (localVendors[i].value / localBudget * 100).toFixed(1) : 0;
                                                        const isOver = diff < 0;
                                                        return (
                                                            <div key={i} onClick={() => setSelectedVendorIdx(i)} className={`card-decision p-8 rounded-[2.5rem] bg-white/5 flex flex-col gap-6 ${selectedVendorIdx === i ? 'border-[#BED993] bg-white/10 shadow-glow-green' : 'border-white/5 hover:border-white/10'}`}>
                                                                <div className="flex items-center gap-8">
                                                                    <div className={`w-14 h-14 rounded-2xl flex items-center justify-center font-black text-sm ${selectedVendorIdx === i ? 'bg-[#BED993] text-emerald-950' : 'bg-white/10 text-white/20'}`}>0{i+1}</div>
                                                                    <input placeholder={`NOME DO FORNECEDOR ${i+1}`} value={localVendors[i].name} onChange={(e) => { const n = [...localVendors]; n[i].name = e.target.value; setLocalVendors(n); }} className="flex-1 bg-transparent border-none text-xl font-black outline-none text-white placeholder:text-white/10 uppercase" onClick={(e) => e.stopPropagation()} />
                                                                    <div className={`px-6 py-3 rounded-2xl font-black uppercase text-[9px] transition-all tracking-widest ${selectedVendorIdx === i ? 'bg-[#BED993] text-emerald-950 shadow-lg' : 'bg-white/10 text-slate-500'}`}>{selectedVendorIdx === i ? 'ELEITO' : 'SELECIONAR'}</div>
                                                                </div>
                                                                <div className="flex items-center justify-between pl-20">
                                                                    <div className="flex items-center gap-4">
                                                                        <span className="text-[10px] font-black text-slate-500 uppercase tracking-widest italic">INVESTIMENTO: R$</span>
                                                                        <input type="number" step="0.01" value={localVendors[i].value} onChange={(e) => { const n = [...localVendors]; n[i].value = Number(e.target.value); setLocalVendors(n); }} className="bg-transparent border-none text-2xl font-black text-emerald-400 outline-none w-40" onClick={(e) => e.stopPropagation()} />
                                                                    </div>
                                                                    <div className="flex flex-col items-end">
                                                                        <span className={`text-[10px] font-black px-4 py-2 rounded-xl ${isOver ? 'bg-red-500/20 text-red-400' : 'bg-blue-500/20 text-blue-400'}`}>
                                                                            {isOver ? 'EXTRA: ' : 'SALDO: '} R$ {Math.abs(diff).toLocaleString('pt-BR')} ({percent}%)
                                                                        </span>
                                                                    </div>
                                                                </div>
                                                            </div>
                                                        );
                                                    })}
                                                </div>
                                            ) : (
                                                <div className="h-[450px] flex flex-col items-center justify-center text-center opacity-30 border-2 border-dashed border-white/20 rounded-[3.5rem] p-10">
                                                    <Icon name="users" size={60} className="mb-8 text-white" />
                                                    <h4 className="font-black uppercase text-lg text-white tracking-[0.6em]">OPERAÇÃO INTERNA</h4>
                                                    <p className="text-[10px] font-bold text-slate-400 uppercase mt-6 tracking-widest italic leading-loose max-w-sm">Os recursos e talentos internos da Unico Ops serão alocados para esta atividade.</p>
                                                </div>
                                            )}
                                        </div>
                                        <button type="submit" className="w-full h-28 bg-white text-slate-900 hover:bg-slate-50 rounded-[3rem] font-black uppercase text-[13px] tracking-[0.5em] shadow-2xl active:scale-[0.98] transition-all flex items-center justify-center gap-6 italic mt-12">
                                            <Icon name="check-circle-2" size={24} /> FINALIZAR PLANEAMENTO
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* FOOTER */}
                    <footer className="fixed bottom-0 w-full bg-white/95 backdrop-blur-md border-t border-slate-100 px-12 py-6 flex flex-col sm:flex-row justify-between items-center text-[10px] text-slate-300 font-black uppercase tracking-[0.5em] z-40">
                        <div className="flex items-center gap-4">
                            <div className={`w-3 h-3 rounded-full ${user ? 'bg-green-500 shadow-[0_0_15px_rgba(34,197,94,0.4)]' : 'bg-red-500 animate-pulse'}`}></div>
                            <span>© 2026 UNICO OPS HUB • AMBIENTE GOLD</span>
                        </div>
                        <div className="flex gap-8 text-slate-200">
                            <span>SISTEMA DE GESTÃO DE VOZ</span>
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
