                                                            <div className="flex-1 grid grid-cols-1 md:grid-cols-12 gap-4">
                                                                {/* Assunto */}
                                                                <div className="md:col-span-6 space-y-1.5">
                                                                    <label className="text-[9px] font-black text-slate-400 uppercase tracking-widest">Assunto / Chamada</label>
                                                                    <input value={p.titulo} onChange={e => {const n=[...reguaFormData.passos]; n[i].titulo=e.target.value; setReguaFormData({...reguaFormData, passos:n})}} placeholder="Ex: Boas-vindas" className="w-full bg-slate-50 border border-slate-100 rounded-xl p-3 text-sm font-bold text-slate-800 outline-none focus:ring-2 focus:ring-indigo-100" />
                                                                </div>
                                                                {/* Canal */}
                                                                <div className="md:col-span-3 space-y-1.5">
                                                                    <label className="text-[9px] font-black text-slate-400 uppercase tracking-widest">Canal</label>
                                                                    <select value={p.canal} onChange={e => {const n=[...reguaFormData.passos]; n[i].canal=e.target.value; setReguaFormData({...reguaFormData, passos:n})}} className="w-full bg-slate-50 border border-slate-100 rounded-xl p-3 text-sm font-bold text-slate-800 outline-none focus:ring-2 focus:ring-indigo-100">
                                                                        <option>Slack</option><option>Email</option><option>WhatsApp</option><option>Push</option>
                                                                    </select>
                                                                </div>
                                                                {/* Delay */}
                                                                <div className="md:col-span-3 space-y-1.5">
                                                                    <label className="text-[9px] font-black text-slate-400 uppercase tracking-widest">Aguardar (Dias)</label>
                                                                    <input type="number" value={p.delayDias} onChange={e => {const n=[...reguaFormData.passos]; n[i].delayDias=e.target.value; setReguaFormData({...reguaFormData, passos:n})}} className="w-full bg-slate-50 border border-slate-100 rounded-xl p-3 text-sm font-bold text-slate-800 outline-none focus:ring-2 focus:ring-indigo-100" />
                                                                </div>
                                                            </div>
                                                            {/* Delete Btn */}
                                                            <button type="button" onClick={() => setReguaFormData({...reguaFormData, passos: reguaFormData.passos.filter((_, idx) => idx !== i)})} className="p-3 mt-4 text-slate-300 hover:text-rose-500 hover:bg-rose-50 rounded-xl transition-all"><Icon name="trash-2" size={18} /></button>
                                                        </div>
                                                        {/* Briefing Textarea */}
                                                        <div className="space-y-1.5">
                                                            <label className="text-[9px] font-black text-slate-400 uppercase tracking-widest">Briefing / Conteúdo</label>
                                                            <textarea value={p.briefing || ''} onChange={e => {const n=[...reguaFormData.passos]; n[i].briefing=e.target.value; setReguaFormData({...reguaFormData, passos:n})}} placeholder="Descreva o objetivo desta comunicação..." className="w-full bg-slate-50 border border-slate-100 rounded-xl p-4 text-sm font-medium text-slate-700 outline-none resize-none h-24 focus:ring-2 focus:ring-indigo-100"></textarea>
                                                        </div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                    
                                    {/* SECTION 4: FOOTER ACTIONS */}
                                    <div className="flex justify-center md:justify-end items-center gap-6 pt-8 border-t border-slate-100">
                                        <button type="button" onClick={() => setIsModalReguaOpen(false)} className="text-[11px] font-black uppercase text-slate-400 hover:text-slate-800 tracking-widest">Cancelar</button>
                                        <button type="submit" className="bg-slate-900 text-white px-10 py-4 rounded-full font-black text-[11px] uppercase tracking-widest hover:bg-indigo-600 shadow-xl transition-all">Confirmar Alterações</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* MODAL EXCLUSÃO */}
                    {isDeleteModalOpen && (
                        <div className="fixed inset-0 bg-slate-900/90 backdrop-blur-sm z-[300] flex items-center justify-center p-4">
                            <div className="bg-white w-full max-w-md rounded-[2.5rem] p-10 shadow-2xl modal-animate text-center text-left">
                                <div className="w-20 h-20 bg-red-50 text-red-500 rounded-full flex items-center justify-center mx-auto mb-6 text-center text-left"><Icon name="trash-2" size={40} className="text-center" /></div>
                                <h3 className="text-2xl font-black uppercase italic tracking-tighter text-slate-900 mb-2 leading-none text-center">Tem certeza?</h3>
                                <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-10 italic text-center">Esta ação é irreversível.</p>
                                <div className="grid grid-cols-2 gap-4 mt-10 text-center">
                                    <button onClick={() => setIsDeleteModalOpen(false)} className="py-4 bg-slate-100 text-slate-400 rounded-2xl font-black uppercase text-[10px] tracking-widest italic text-center">Cancelar</button>
                                    <button onClick={executeDelete} className="py-4 bg-red-500 text-white rounded-2xl font-black uppercase text-[10px] tracking-widest hover:bg-red-600 shadow-lg shadow-red-500/20 italic text-center">Excluir</button>
                                </div>
                            </div>
                        </div>
                    )}

                    <footer className="fixed bottom-0 w-full bg-white/95 backdrop-blur-md border-t border-slate-100 px-6 sm:px-10 py-5 flex flex-col sm:flex-row justify-between items-center text-[8px] sm:text-[9px] text-slate-300 font-black uppercase tracking-[0.4em] z-40 shadow-inner gap-2 text-left">
                        <div className="flex items-center gap-3 text-slate-400 text-left"><div className={`w-2.5 h-2.5 rounded-full ${user ? 'bg-green-500 shadow-[0_0_12px_rgba(34,197,94,0.3)]' : 'bg-slate-300 animate-pulse'}`}></div><span>© 2026 Unico Ops Hub. Ambiente Gold Ativo.</span></div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
