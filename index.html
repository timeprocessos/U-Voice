<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>U-Voice | Hub de Experiência</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #FDFDFE; margin: 0; padding: 0; }
        .loading-shimmer {
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, onSnapshot, setDoc, deleteDoc, query, addDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Suas credenciais reais do Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyCRNpfVN3n_Ue9kocKSU7EGlp9ElBJWvRg",
            authDomain: "u-voice-82837.firebaseapp.com",
            projectId: "u-voice-82837",
            storageBucket: "u-voice-82837.firebasestorage.app",
            messagingSenderId: "363918476944",
            appId: "1:363918476944:web:02fe7e523c4eed24abba15",
            measurementId: "G-TM4FHKNXXG"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = "u-voice-prod"; 

        window.FirebaseInstance = { auth, db, appId, collection, doc, onSnapshot, setDoc, deleteDoc, addDoc, query, signInAnonymously, onAuthStateChanged };
    </script>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { auth, db, appId, collection, doc, onSnapshot, setDoc, deleteDoc, addDoc, query, signInAnonymously, onAuthStateChanged } = window.FirebaseInstance;

        const BRAND = {
            sand1: '#FBFAF3', sand2: '#F0EEE6', sand7: '#1F1D1A', white: '#FFFFFF',
            black: '#000000', primaryButton: '#397394', teaGreen: '#BED993',
            sunflower: '#FDC256', coral: '#F77D8D', sky: '#82B3D0', cherryRed: '#D22B2B'
        };

        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const UnicoLogo = () => (
            <svg width="34" height="34" viewBox="0 0 100 100" fill="none">
                <path d="M20 20V55C20 71.5685 33.4315 85 50 85C66.5685 85 80 71.5685 80 55V20H65V55C65 63.2843 58.2843 70 50 70C41.7157 70 35 63.2843 35 55V20H20Z" fill="currentColor"/>
            </svg>
        );

        function StatCard({ title, value, iconName, color, loading }) {
            const styles = {
                blue: { bg: BRAND.white, accent: BRAND.sky, text: BRAND.black },
                purple: { bg: BRAND.sand7, accent: '#A281CF', text: BRAND.white },
                emerald: { bg: BRAND.sand1, accent: BRAND.teaGreen, text: BRAND.black },
                rose: { bg: BRAND.white, accent: BRAND.coral, text: BRAND.black }
            };
            const current = styles[color] || styles.blue;
            return (
                <div className="p-6 rounded-[2.5rem] border border-slate-100 shadow-sm transition-all hover:scale-[1.02]" style={{ backgroundColor: current.bg }}>
                    <div className="p-3 rounded-2xl border w-fit mb-4" style={{ borderColor: BRAND.sand2, color: current.accent }}>
                        <Icon name={iconName} size={20} />
                    </div>
                    {loading ? <div className="h-10 w-24 loading-shimmer rounded-lg mb-2"></div> : <h3 className="text-4xl font-black tracking-tighter" style={{ color: current.text }}>{value}</h3>}
                    <div className="text-[10px] font-black uppercase tracking-widest mt-2 opacity-40" style={{ color: current.text }}>{title}</div>
                </div>
            );
        }

        function App() {
            const [user, setUser] = useState(null);
            const [activeTab, setActiveTab] = useState('comunicados');
            const [isAdmin, setIsAdmin] = useState(false);
            const [comms, setComms] = useState([]);
            const [stats, setStats] = useState({ posts: 0, interactions: 0, enps: 0, pulse: 0 });
            const [loading, setLoading] = useState(true);

            // Form states
            const [newComm, setNewComm] = useState({ title: '', channel: 'Slack', engajamento: 0 });

            useEffect(() => {
                signInAnonymously(auth).catch(console.error);
                return onAuthStateChanged(auth, setUser);
            }, []);

            useEffect(() => {
                if (!user) return;
                const unsubComms = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'comms'), (snap) => {
                    setComms(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                    setLoading(false);
                });
                const unsubStats = onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'stats', 'main'), (snap) => {
                    if (snap.exists()) setStats(snap.data());
                });
                return () => { unsubComms(); unsubStats(); };
            }, [user]);

            const handleAddComm = async (e) => {
                e.preventDefault();
                if (!newComm.title) return;
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'comms'), {
                    ...newComm,
                    date: new Date().toISOString()
                });
                setNewComm({ title: '', channel: 'Slack', engajamento: 0 });
            };

            const handleDeleteComm = async (id) => {
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'comms', id));
            };

            const updateStat = async (field, value) => {
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'stats', 'main'), {
                    ...stats,
                    [field]: Number(value)
                }, { merge: true });
            };

            return (
                <div className="min-h-screen pb-24">
                    <nav className="bg-white border-b px-6 md:px-10 py-6 flex justify-between items-center sticky top-0 z-50">
                        <div className="flex items-center gap-4">
                            <div className="w-12 h-12 bg-black rounded-2xl flex items-center justify-center text-white cursor-pointer active:scale-95 transition-transform" onClick={() => setIsAdmin(!isAdmin)}>
                                <UnicoLogo />
                            </div>
                            <div>
                                <h1 className="text-xl md:text-2xl font-black italic uppercase leading-none">U - Voice</h1>
                                <p className="text-[8px] font-black uppercase text-slate-400 tracking-[0.4em] mt-1">Experience Hub</p>
                            </div>
                        </div>
                        <div className="flex bg-slate-100 p-1 rounded-full gap-1 md:gap-2">
                            {['comunicados', 'impacto', 'agenda'].map(tab => (
                                <button key={tab} onClick={() => setActiveTab(tab)} className={`px-4 md:px-6 py-2 rounded-full text-[9px] md:text-[10px] font-black uppercase transition-all ${activeTab === tab ? 'bg-black text-white' : 'text-slate-400 hover:text-slate-600'}`}>
                                    {tab}
                                </button>
                            ))}
                        </div>
                    </nav>

                    <main className="max-w-7xl mx-auto px-6 md:px-10 py-16">
                        {isAdmin && (
                            <div className="mb-12 p-8 bg-yellow-50 border-2 border-yellow-200 rounded-[2rem] animate-in fade-in zoom-in duration-300">
                                <div className="flex justify-between items-center mb-6">
                                    <h3 className="text-xl font-black uppercase italic text-yellow-700">Painel de Edição</h3>
                                    <button onClick={() => setIsAdmin(false)} className="text-[10px] font-black uppercase bg-yellow-200 px-4 py-2 rounded-full">Sair</button>
                                </div>
                                
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                    <form onSubmit={handleAddComm} className="space-y-4">
                                        <p className="text-[10px] font-black uppercase text-yellow-600">Postar Novo Comunicado</p>
                                        <input value={newComm.title} onChange={e => setNewComm({...newComm, title: e.target.value})} placeholder="Título do Post" className="w-full p-4 rounded-2xl border-none focus:ring-2 ring-yellow-400 outline-none shadow-sm" />
                                        <div className="flex gap-4">
                                            <select value={newComm.channel} onChange={e => setNewComm({...newComm, channel: e.target.value})} className="flex-1 p-4 rounded-2xl border-none outline-none shadow-sm">
                                                <option>Slack</option>
                                                <option>E-mail</option>
                                                <option>Teams</option>
                                                <option>WhatsApp</option>
                                            </select>
                                            <input type="number" value={newComm.engajamento} onChange={e => setNewComm({...newComm, engajamento: e.target.value})} placeholder="%" className="w-24 p-4 rounded-2xl border-none outline-none shadow-sm" />
                                        </div>
                                        <button type="submit" className="w-full bg-black text-white py-4 rounded-2xl font-black uppercase text-[10px] hover:bg-slate-800 transition-colors">Adicionar ao Hub</button>
                                    </form>

                                    <div className="space-y-4">
                                        <p className="text-[10px] font-black uppercase text-yellow-600">Métricas de Impacto</p>
                                        <div className="grid grid-cols-2 gap-4">
                                            {Object.keys(stats).map(key => (
                                                <div key={key}>
                                                    <label className="text-[8px] font-black uppercase text-slate-400 block mb-1">{key}</label>
                                                    <input type="number" value={stats[key]} onChange={e => updateStat(key, e.target.value)} className="w-full p-3 rounded-xl border-none outline-none shadow-sm" />
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        <header className="mb-16">
                            <h2 className="text-6xl md:text-8xl font-black tracking-tighter italic leading-none">by the numbers.</h2>
                            <p className="text-slate-400 font-black uppercase text-xs md:text-sm tracking-[0.4em] mt-4">Unico Operações • Inteligência Estratégica</p>
                        </header>

                        {activeTab === 'impacto' && (
                            <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-6">
                                <StatCard title="Posts no Mês" value={stats.posts} iconName="file-text" color="blue" loading={loading} />
                                <StatCard title="Total Interações" value={stats.interactions.toLocaleString('pt-PT')} iconName="trending-up" color="purple" loading={loading} />
                                <StatCard title="Score eNPS" value={stats.enps} iconName="smile" color="rose" loading={loading} />
                                <StatCard title="Clima & Pulso" value={`${stats.pulse}%`} iconName="zap" color="emerald" loading={loading} />
                            </div>
                        )}

                        {activeTab === 'comunicados' && (
                            <div className="bg-white rounded-[2.5rem] border shadow-sm overflow-hidden">
                                <div className="overflow-x-auto">
                                    <table className="w-full text-left">
                                        <thead>
                                            <tr className="text-slate-400 text-[10px] uppercase font-black border-b bg-slate-50">
                                                <th className="px-8 py-6">Título</th>
                                                <th className="px-8 py-6">Canal</th>
                                                <th className="px-8 py-6 text-right">Score</th>
                                                {isAdmin && <th className="px-8 py-6"></th>}
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {comms.length === 0 && !loading && (
                                                <tr><td colSpan="4" className="px-8 py-12 text-center text-slate-300 italic">Nenhum comunicado encontrado.</td></tr>
                                            )}
                                            {comms.map(c => (
                                                <tr key={c.id} className="border-b last:border-none group hover:bg-slate-50 transition-colors">
                                                    <td className="px-8 py-6 font-black uppercase italic text-lg">{c.title}</td>
                                                    <td className="px-8 py-6 text-[10px] font-black text-slate-400">
                                                        <span className="bg-slate-100 px-3 py-1 rounded-full">{c.channel}</span>
                                                    </td>
                                                    <td className="px-8 py-6 text-right font-black text-[#397394]">{c.engajamento}%</td>
                                                    {isAdmin && (
                                                        <td className="px-8 py-6 text-right">
                                                            <button onClick={() => handleDeleteComm(c.id)} className="text-red-400 hover:text-red-600 p-2">
                                                                <Icon name="trash-2" size={16} />
                                                            </button>
                                                        </td>
                                                    )}
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}

                        {activeTab === 'agenda' && (
                            <div className="p-20 border-4 border-dashed rounded-[3rem] text-center text-slate-200">
                                <Icon name="calendar" size={48} className="mx-auto mb-4 opacity-10" />
                                <p className="font-black uppercase tracking-widest text-[10px]">Agenda sincronizada com calendário global</p>
                            </div>
                        )}
                    </main>

                    <footer className="fixed bottom-0 w-full bg-white/80 backdrop-blur border-t px-6 md:px-10 py-3 flex justify-between items-center text-[8px] text-slate-300 font-black uppercase tracking-widest">
                        <span className="hidden md:inline">Projeto: u-voice-82837</span>
                        <div className="flex items-center gap-2 mx-auto md:mx-0">
                            <div className={`w-1.5 h-1.5 rounded-full ${user ? 'bg-green-500' : 'bg-red-500 animate-pulse'}`}></div>
                            <span>{user ? `Cloud Sync: Ativo` : 'Offline'}</span>
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
