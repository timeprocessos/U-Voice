                                                        <div className="space-y-1.5">
                                                            <div className="flex items-center gap-4">
                                                                <h3 className="text-2xl font-black text-slate-900 tracking-tight">{regua.nome}</h3>
                                                                {nps && (
                                                                    <div className={`flex items-center gap-2 px-4 py-1.5 rounded-full text-[11px] font-black uppercase ${nps.bg} ${nps.text} border-2 border-current shadow-sm`}>
                                                                        <Icon name={nps.iconName} size={16}/> <span>NPS {regua.valorNPS}</span>
                                                                    </div>
                                                                )}
                                                            </div>
                                                            <div className="flex items-center gap-6 text-sm">
                                                                <span className="font-bold text-slate-400 uppercase tracking-widest flex items-center gap-2">
                                                                    <Icon name="users" size={16} className="text-indigo-400"/> {regua.publico}
                                                                </span>
                                                                <div className="flex items-center gap-3 bg-white px-4 py-1.5 rounded-full border border-slate-100 text-[11px] font-black text-slate-700 shadow-sm">
                                                                    <Icon name="calendar" size={14} className="text-slate-300"/> 
                                                                    {reguaUtils.formatDate(new Date(regua.dataInicio + 'T12:00:00'))} 
                                                                    <Icon name="arrow-right" size={14} className="mx-1 text-slate-200"/> 
                                                                    <span className="text-indigo-600">{lastDate}</span>
                                                                </div>
                                                            </div>
                                                        </div>
                                                    </div>

                                                    <div className="flex items-center gap-12">
                                                        <div className="flex flex-col items-end gap-2">
                                                            <div className="text-[11px] font-black text-slate-300 uppercase tracking-tighter">Status da Jornada</div>
                                                            <div className="w-52 h-3 bg-white rounded-full border border-slate-100 overflow-hidden shadow-inner p-0.5">
                                                                <div className="h-full bg-indigo-500 rounded-full transition-all duration-1000 ease-out shadow-lg" style={{ width: `${progress}%` }}></div>
                                                            </div>
                                                            <div className="text-[11px] font-black text-indigo-500 uppercase tracking-widest">{progress}% CONCLUÍDO</div>
                                                        </div>
                                                        <div className="flex items-center gap-3">
                                                            <button onClick={() => handleEditRegua(regua)} className="p-3.5 text-slate-400 hover:text-white hover:bg-slate-900 rounded-[1.2rem] transition-all"><Icon name="edit-3" size={22}/></button>
                                                            <button onClick={() => promptDelete(regua.id, 'reguas_planejamento')} className="p-3.5 text-slate-400 hover:text-white hover:bg-rose-500 rounded-[1.2rem] transition-all"><Icon name="trash-2" size={22}/></button>
                                                        </div>
                                                    </div>
                                                </div>

                                                <div className="p-12 overflow-x-auto custom-scroll">
                                                    <div className="flex items-start gap-12 min-w-max">
                                                        {steps.map((passo, idx) => (
                                                            <React.Fragment key={idx}>
                                                                <div className="w-80 flex-none relative">
                                                                    <div className="mb-4 h-8 flex items-center gap-2">
                                                                        {passo.status === 'Atrasado' && (
                                                                            <div className="bg-rose-50 text-rose-500 text-[10px] font-black px-3 py-1.5 rounded-xl border-2 border-rose-100 animate-bounce flex items-center gap-1.5">
                                                                                <Icon name="alert-triangle" size={12}/> EM ATRASO
                                                                            </div>
                                                                        )}
                                                                        {passo.status === 'Hoje' && (
                                                                            <div className="bg-indigo-50 text-indigo-600 text-[10px] font-black px-3 py-1.5 rounded-xl border-2 border-indigo-100 uppercase flex items-center gap-1.5 shadow-sm">
                                                                                <Icon name="clock" size={12}/> HOJE
                                                                            </div>
                                                                        )}
                                                                        {passo.status === 'Enviado' && (
                                                                            <div className="bg-emerald-50 text-emerald-600 text-[10px] font-black px-3 py-1.5 rounded-xl border-2 border-emerald-100 uppercase flex items-center gap-1.5">
                                                                                <Icon name="check" size={12}/> ENVIADO
                                                                            </div>
                                                                        )}
                                                                    </div>

                                                                    <div className={`p-8 rounded-[3rem] border-2 transition-all relative ${
                                                                        passo.concluido ? 'border-emerald-100 bg-emerald-50/10 grayscale-[0.5]' : 
                                                                        passo.status === 'Atrasado' ? 'border-rose-100 bg-white shadow-xl shadow-rose-50/50' : 'border-slate-50 bg-[#F8FAFC]/50 hover:bg-white hover:shadow-2xl'
                                                                    }`}>
                                                                        <div className="flex items-center justify-between mb-6">
                                                                            <div className={`p-3 rounded-2xl shadow-sm ${
                                                                                passo.canal === 'Email' ? 'bg-indigo-100 text-indigo-600' :
                                                                                passo.canal === 'WhatsApp' ? 'bg-emerald-100 text-emerald-600' : 
                                                                                passo.canal === 'Slack' ? 'bg-purple-100 text-purple-600' : 'bg-amber-100 text-amber-600'
                                                                            }`}>
                                                                                {passo.canal === 'Email' ? <Icon name="mail" size={22} /> : 
                                                                                passo.canal === 'WhatsApp' ? <Icon name="message-square" size={22} /> : 
                                                                                passo.canal === 'Slack' ? <Icon name="hash" size={22} /> : <Icon name="bell" size={22} />}
                                                                            </div>
                                                                            <button onClick={() => toggleStepRegua(regua.id, regua.passos, idx)}
                                                                                className={`w-10 h-10 rounded-full border-2 flex items-center justify-center transition-all ${
                                                                                    passo.concluido ? 'bg-emerald-500 border-emerald-500 text-white shadow-xl shadow-emerald-200' : 'bg-white border-slate-200 text-slate-200 hover:border-indigo-500 hover:text-indigo-500'
                                                                                }`}>
                                                                                <Icon name="check" size={18} forceKey={passo.concluido ? 'y'+idx : 'n'+idx} />
                                                                            </button>
                                                                        </div>
                                                                        
                                                                        <h4 className={`font-black text-base mb-3 leading-tight h-12 line-clamp-2 ${passo.concluido ? 'text-slate-400 line-through' : 'text-slate-900'}`}>{passo.titulo}</h4>
                                                                        <p className="text-xs text-slate-400 leading-relaxed mb-8 line-clamp-2 h-8 italic">"{passo.briefing || 'Nenhum briefing cadastrado.'}"</p>
                                                                        
                                                                        <div className="flex items-center justify-between pt-6 border-t border-slate-50">
                                                                            <div>
                                                                                <span className="text-[10px] font-black text-slate-300 uppercase block mb-1 tracking-tighter">Data Prevista</span>
                                                                                <span className="text-sm font-black text-slate-900">{passo.dateStr}</span>
                                                                            </div>
                                                                            <div className="bg-slate-900 text-[11px] font-black text-white px-3 py-1 rounded-full shadow-lg">
                                                                                T + {passo.delayDias}D
                                                                            </div>
                                                                        </div>
                                                                    </div>
                                                                </div>
                                                                {idx < steps.length - 1 && (
                                                                    <div className="self-center pt-10 text-slate-100">
                                                                        <Icon name="chevron-right" size={32} />
                                                                    </div>
                                                                )}
                                                            </React.Fragment>
                                                        ))}
                                                    </div>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-4 gap-8 pt-16 border-t border-slate-100">
                                    <div className="bg-white p-8 rounded-[3rem] border border-slate-100 shadow-sm transition-all hover:shadow-xl group">
                                        <div className="text-5xl font-black text-rose-500 group-hover:scale-110 transition-transform origin-left">
                                            {reguas.reduce((acc, r) => acc + calculateTimeline(r).steps.filter(p => p.status === 'Atrasado').length, 0)}
                                        </div>
                                        <div className="text-[11px] font-black text-slate-400 uppercase tracking-widest mt-3">Ações Pendentes (Atrasadas)</div>
                                    </div>
                                    <div className="bg-white p-8 rounded-[3rem] border border-slate-100 shadow-sm transition-all hover:shadow-xl group">
                                        <div className="text-5xl font-black text-indigo-600 group-hover:scale-110 transition-transform origin-left">
                                            {reguas.reduce((acc, r) => acc + calculateTimeline(r).steps.filter(p => p.status === 'Hoje').length, 0)}
                                        </div>
                                        <div className="text-[11px] font-black text-slate-400 uppercase tracking-widest mt-3">Interações para o dia de hoje</div>
                                    </div>
                                    <div className="bg-white p-8 rounded-[3rem] border border-slate-100 shadow-sm transition-all hover:shadow-xl group">
                                        <div className="text-5xl font-black text-emerald-500 group-hover:scale-110 transition-transform origin-left">
                                            {reguas.reduce((acc, r) => acc + calculateTimeline(r).steps.filter(p => p.concluido).length, 0)}
                                        </div>
                                        <div className="text-[11px] font-black text-slate-400 uppercase tracking-widest mt-3">Total de envios realizados</div>
                                    </div>
                                    <div className="bg-slate-900 p-8 rounded-[3rem] shadow-2xl shadow-slate-200 transition-all hover:scale-[1.02]">
                                        <div className="text-5xl font-black text-white">{reguas.length}</div>
                                        <div className="text-[11px] font-black text-slate-400 uppercase tracking-widest mt-3">Réguas Estratégicas Ativas</div>
                                    </div>
                                </div>

                                <div className="mt-8 bg-indigo-50/50 p-8 rounded-[2.5rem] border border-indigo-100 flex items-start gap-6 text-xs text-indigo-800 italic shadow-sm">
                                    <Icon name="info" size={24} className="text-indigo-500 mt-1 shrink-0" />
                                    <p className="leading-relaxed">
                                        <strong>The Comms Journey:</strong> Esta é sua central de inteligência para orquestrar jornadas de comunicação. Planeje disparos multicanais, acompanhe o progresso em tempo real e utilize os indicadores de NPS para medir o impacto de cada estratégia.
                                    </p>
                                </div>
                            </section>
                        )}
                    </main>

                    {/* MODAL COMUNICADOS INTERNOS */}
                    {isModalCommOpen && (
                        <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-[150] flex items-center justify-center p-2 sm:p-4">
                            <div className="bg-white w-full max-w-4xl rounded-[2rem] sm:rounded-[3rem] p-6 sm:p-12 shadow-2xl modal-animate relative max-h-[95vh] overflow-y-auto custom-scroll">
                                <button type="button" onClick={() => setIsModalCommOpen(false)} className="btn-close-modal"><Icon name="x" size={24} /></button>
                                <h3 className="text-3xl font-black italic uppercase leading-none tracking-tighter mb-10 text-slate-800">registro de comunicação</h3>
                                <form onSubmit={handleSaveComm} className="grid grid-cols-1 md:grid-cols-2 gap-10">
                                    <div className="space-y-8">
                                        <div><label className="text-[10px] font-black uppercase text-slate-400 mb-2 block font-bold">Título Post</label><input name="title" defaultValue={editingComm?.title} required className="w-full bg-slate-50 border-none rounded-2xl p-5 font-bold text-lg outline-none shadow-sm" /></div>
                                        <div><label className="text-[10px] font-black uppercase text-slate-400 mb-2 block font-bold">Link da Comunicação</label><div className="relative"><input name="commLink" defaultValue={editingComm?.commLink} className="w-full bg-slate-50 border-none rounded-xl p-5 pl-12 font-bold outline-none shadow-sm" placeholder="URL da postagem" /><Icon name="link" size={14} className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-300" /></div></div>
                                        <div>
                                            <div className="flex items-center justify-between gap-3 mb-3">
                                                <label className="text-[10px] font-black uppercase text-slate-400 block font-bold">Analistas</label>
                                                <button type="button" onClick={() => {const a = prompt("Nome do Novo Analista:"); if(a) setAllAnalysts(prev => [...prev, a])}} className="bg-yellow-400 p-2 rounded-lg text-black hover:scale-110 transition-transform shadow-lg flex items-center justify-center">
                                                    <Icon name="plus" size={14} className="font-bold" />
                                                </button>
                                            </div>
                                            <div className="flex flex-wrap gap-2">
                                                {allAnalysts.map(a => (
                                                    <div key={a} onClick={() => toggleAnalyst(a)} className={`checkbox-flag ${selectedAnalysts.includes(a) ? 'active' : ''}`}>
                                                        <Icon name={selectedAnalysts.includes(a) ? "check-circle-2" : "circle"} size={14} forceKey={selectedAnalysts.includes(a) ? 'y' : 'n'} />
                                                        {a}
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                        <div className="space-y-4">
                                            <label className="text-[10px] font-black uppercase text-slate-400 block font-bold">Canal de Envio (Padrão)</label>
                                            <div className="p-4 rounded-xl border-2 border-[#4A154B] bg-[#4A154B] text-white shadow-lg flex items-center justify-center gap-3">
                                                <Icon name="slack" size={18} />
                                                <span className="text-[10px] font-black uppercase">Slack Only</span>
                                            </div>
                                        </div>
                                        <div className="grid grid-cols-2 gap-4">
                                            <div><label className="text-[10px] font-black uppercase text-slate-400 mb-2 block font-bold">Data</label><input name="date" type="date" defaultValue={editingComm?.date} required className="w-full bg-slate-50 border-none rounded-xl p-4 font-bold outline-none shadow-sm" /></div>
                                            <div><label className="text-[10px] font-black uppercase text-slate-400 mb-2 block font-bold">Hora</label><input name="postTime" type="time" defaultValue={editingComm?.postTime} required className="w-full bg-slate-50 border-none rounded-xl p-4 font-bold outline-none shadow-sm" /></div>
                                        </div>
                                    </div>
                                    <div className="space-y-8">
                                        <div className="bg-[#f8fafc] p-6 sm:p-10 rounded-[2rem] sm:rounded-[3rem] border border-slate-100 space-y-6 shadow-inner">
                                            <div className="text-[10px] font-black uppercase text-[#397394] tracking-widest italic flex items-center justify-center gap-2">Impacto Interno</div>
                                            
                                            <div className="grid grid-cols-3 gap-4">
                                                <div><label className="text-[8px] uppercase text-slate-400 block italic text-center">Alcance</label><input name="views" type="number" value={commReach} onChange={(e) => setCommReach(Number(e.target.value))} className="w-full bg-white border border-slate-100 rounded-xl p-4 font-black text-center outline-none shadow-sm" /></div>
                                                <div><label className="text-[8px] uppercase text-slate-400 block italic text-center">Reações</label><input name="reactions" type="number" value={commReactions} onChange={(e) => setCommReactions(Number(e.target.value))} className="w-full bg-white border border-slate-100 rounded-xl p-4 font-black text-center outline-none shadow-sm" /></div>
                                                <div><label className="text-[8px] uppercase text-slate-400 block italic text-center">Comments</label><input name="comments" type="number" value={commComments} onChange={(e) => setCommComments(Number(e.target.value))} className="w-full bg-white border border-slate-100 rounded-xl p-4 font-black text-center outline-none shadow-sm" /></div>
                                            </div>
                                            
                                            <div><label className="text-[10px] font-black uppercase text-slate-400 block mb-2 italic text-center">Base Canal</label><input name="population" type="number" value={commPopulation} onChange={(e) => setCommPopulation(Number(e.target.value))} placeholder="Preencher" className="w-full bg-white border-none rounded-2xl p-4 font-black text-center outline-none shadow-sm" /></div>
                                            
                                            <div className="grid grid-cols-2 gap-4 pt-4 border-t border-slate-200/50">
                                                <div className="text-center">
                                                    <div className="flex items-center justify-center gap-1 mb-1 relative group cursor-help">
                                                        <span className="text-[8px] font-black uppercase text-slate-400 block">Taxa de Engaj. (TER)</span>
                                                        <Icon name="help-circle" size={10} className="text-slate-400 hover:text-indigo-500 transition-colors" />
                                                        <div className="absolute bottom-full mb-2 left-1/2 -translate-x-1/2 w-48 bg-slate-900 text-white text-[9px] font-medium normal-case tracking-normal p-3 rounded-xl shadow-xl opacity-0 group-hover:opacity-100 pointer-events-none transition-opacity z-50 text-center">
                                                            (Reações + Comentários) ÷ Alcance.<br/>Mede a conversão real de quem viu o post.
                                                            <div className="absolute top-full left-1/2 -translate-x-1/2 border-4 border-transparent border-t-slate-900"></div>
                                                        </div>
                                                    </div>
                                                    <span className="text-2xl font-black text-indigo-600">{commReach > 0 ? (((commReactions + commComments) / commReach) * 100).toFixed(2) : "0.00"}%</span>
                                                </div>
                                                <div className="text-center border-l border-slate-200/50">
                                                    <div className="flex items-center justify-center gap-1 mb-1 relative group cursor-help">
                                                        <span className="text-[8px] font-black uppercase text-slate-400 block">Taxa de Alcance (TA)</span>
                                                        <Icon name="help-circle" size={10} className="text-slate-400 hover:text-emerald-500 transition-colors" />
                                                        <div className="absolute bottom-full mb-2 left-1/2 -translate-x-1/2 w-48 bg-slate-900 text-white text-[9px] font-medium normal-case tracking-normal p-3 rounded-xl shadow-xl opacity-0 group-hover:opacity-100 pointer-events-none transition-opacity z-50 text-center">
                                                            Alcance ÷ Base Canal.<br/>Mede a penetração da mensagem na audiência total do canal.
                                                            <div className="absolute top-full left-1/2 -translate-x-1/2 border-4 border-transparent border-t-slate-900"></div>
                                                        </div>
                                                    </div>
                                                    <span className="text-2xl font-black text-emerald-600">{commPopulation > 0 ? ((commReach / commPopulation) * 100).toFixed(2) : "0.00"}%</span>
                                                </div>
                                            </div>

                                            <div>
                                                <label className="text-[10px] font-black uppercase text-slate-400 block mb-2 italic text-center">Notas de Performance / Comentários</label>
                                                <textarea name="notas" defaultValue={editingComm?.notas} rows="2" className="w-full bg-white border-none rounded-2xl p-4 text-xs font-bold outline-none shadow-sm resize-none text-center" placeholder="Insira análises e observações aqui..."></textarea>
                                            </div>
                                        </div>
                                        <div className="grid grid-cols-2 gap-4">
                                            <div><label className="text-[10px] font-black uppercase text-slate-400 mb-2 block font-bold">Editoria</label><select name="editoria" defaultValue={editingComm?.editoria || EDITORIAS_LIST[0]} className="w-full bg-slate-50 border-none rounded-xl p-4 font-black shadow-sm">{EDITORIAS_LIST.map(e => <option key={e}>{e}</option>)}</select></div>
                                            <div><label className="text-[10px] font-black uppercase text-slate-400 mb-2 block font-bold">Status</label><select name="status" defaultValue={editingComm?.status || "Aguardando Envio"} className="w-full bg-slate-50 border-none rounded-xl p-4 font-bold shadow-sm">{STATUS_OPTIONS.map(s => <option key={s}>{s}</option>)}</select></div>
                                        </div>
                                        <button type="submit" className="w-full py-6 bg-black text-white rounded-[2rem] font-black uppercase text-xs tracking-[0.4em] active:scale-[0.98] shadow-2xl italic text-center">SALVAR REGISTRO</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* MODAL EXTERNOS */}
                    {isModalExternalOpen && (
                        <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-[150] flex items-center justify-center p-4">
                            <div className="bg-white w-full max-w-4xl rounded-[2rem] sm:rounded-[3rem] p-6 sm:p-12 shadow-2xl modal-animate relative max-h-[90vh] overflow-y-auto custom-scroll">
                                <button type="button" onClick={() => setIsModalExternalOpen(false)} className="btn-close-modal"><Icon name="x" size={24} /></button>
                                <h3 className="text-3xl font-black italic uppercase tracking-tighter mb-4 text-slate-800">REGISTRO DE COMUNICAÇÃO EXTERNA</h3>
                                <p className="text-[10px] font-black uppercase text-[#397394] mb-10 tracking-[0.2em] italic">Product: Outbound Flow</p>
                                <form onSubmit={handleSaveExternal} className="grid grid-cols-1 md:grid-cols-2 gap-12">
                                    <div className="space-y-8">
                                        <div><label className="text-[10px] font-black uppercase text-slate-400 mb-2 block font-bold">Campanha (IDCloud)</label><input name="title" defaultValue={editingExternal?.title} required className="w-full bg-slate-50 border-none rounded-xl p-5 font-bold outline-none shadow-sm" placeholder="Nome da comunicação" /></div>
                                        <div>
                                            <div className="flex items-center justify-between gap-3 mb-3"><label className="text-[10px] font-black uppercase text-slate-400 block font-bold">Analista Responsável</label><button type="button" onClick={() => {const a = prompt("Nome do Novo Analista:"); if(a) setAllExtAnalysts([...allExtAnalysts, a])}} className="text-[#397394] hover:scale-110 transition-transform"><Icon name="plus-circle" size={18}/></button></div>
                                            <select name="analyst" defaultValue={editingExternal?.analyst || allExtAnalysts[0]} className="w-full bg-slate-50 border-none rounded-xl p-5 font-black outline-none shadow-sm">{allExtAnalysts.map(a => <option key={a} value={a}>{a}</option>)}</select>
                                        </div>
                                        <div><label className="text-[10px] font-black uppercase text-slate-400 mb-2 block italic font-bold">Objetivo (Camada PMM)</label><input name="objective" defaultValue={editingExternal?.objective} required className="w-full bg-slate-50 border-none rounded-xl p-5 font-bold outline-none shadow-sm" placeholder="Propósito da mensagem" /></div>
                                        
                                        <div>
                                            <label className="text-[10px] font-black uppercase text-slate-400 mb-2 block font-bold">Link da Comunicação</label>
                                            <div className="relative">
                                                <input name="commLink" defaultValue={editingExternal?.commLink} className="w-full bg-slate-50 border-none rounded-xl p-5 pl-12 font-bold outline-none shadow-sm" placeholder="URL do conteúdo" />
                                                <Icon name="link" size={14} className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-300" />
                                            </div>
                                            <div className="flex items-center justify-between bg-slate-50 p-3.5 rounded-xl border border-slate-100 mt-4">
                                                <span className="text-[10px] font-black text-slate-400 uppercase">Monitorar Cliques/NPS?</span>
                                                <button type="button" onClick={() => setMonitorClicks(!monitorClicks)}
                                                        className={`w-12 h-6 rounded-full transition-all relative ${monitorClicks ? 'bg-indigo-600 shadow-lg shadow-indigo-100' : 'bg-slate-300'}`}>
                                                    <div className={`absolute top-1 w-4 h-4 bg-white rounded-full transition-all ${monitorClicks ? 'left-7' : 'left-1'}`}></div>
                                                </button>
                                            </div>
                                        </div>

                                        <div><div className="flex items-center gap-2 mb-3"><label className="text-[10px] font-black uppercase text-slate-400 block font-bold">Público (Países)</label></div><div className="flex flex-wrap gap-2">{Object.keys(COUNTRIES_MAP).map(c => (<div key={c} onClick={() => setSelectedCountries(prev => prev.includes(c) ? prev.filter(x => x !== c) : [...prev, c])} className={`checkbox-flag ${selectedCountries.includes(c) ? 'active' : ''}`}><RoundFlag country={c} /></div>))}</div></div>
                                    </div>
                                    <div className="space-y-8">
                                        <div className="grid grid-cols-2 gap-4">
                                            <div><label className="text-[10px] font-black uppercase text-slate-400 mb-2 block font-bold">Data Envio</label><input name="date" type="date" defaultValue={editingExternal?.date} required className="w-full bg-slate-50 border-none rounded-xl p-4 font-bold outline-none shadow-sm" /></div>
                                            <div><label className="text-[10px] font-black uppercase text-slate-400 mb-2 block font-bold">Hora Envio</label><input name="postTime" type="time" defaultValue={editingExternal?.postTime} required className="w-full bg-slate-50 border-none rounded-xl p-4 font-bold outline-none shadow-sm" /></div>
                                        </div>
                                        <div><label className="text-[10px] font-black uppercase text-slate-400 mb-2 block font-bold">Status</label><select name="status" defaultValue={editingExternal?.status || 'Aguardando Envio'} className="w-full bg-slate-50 border-none rounded-xl p-4 font-black outline-none shadow-sm">{EXTERNAL_STATUS_OPTIONS.map(s => <option key={s}>{s}</option>)}</select></div>
                                        
                                        <div className="bg-[#f8fafc] p-6 sm:p-10 rounded-[2rem] sm:rounded-[3rem] border border-slate-100 space-y-6 shadow-inner text-center">
                                            <div className="text-[10px] font-black uppercase text-slate-400 tracking-widest italic flex items-center justify-center gap-2">Performance Outbound</div>
                                            <div className={`grid ${monitorClicks ? 'grid-cols-3' : 'grid-cols-2'} gap-4`}>
                                                <div><label className="text-[8px] font-black uppercase text-slate-400 mb-2 block text-center">Total Enviados</label><input name="sentCount" type="number" value={sentCount} onChange={(e) => setSentCount(Number(e.target.value))} className="w-full bg-white border-none rounded-xl p-4 font-black text-center text-lg sm:text-xl outline-none shadow-sm" /></div>
                                                <div><label className="text-[8px] font-black uppercase text-slate-400 mb-2 block text-center">Total Aberturas</label><input name="openedCount" type="number" value={openedCount} onChange={(e) => setOpenedCount(Number(e.target.value))} className="w-full bg-white border-none rounded-xl p-4 font-black text-center text-lg sm:text-xl outline-none shadow-sm" /></div>
                                                {monitorClicks && (
                                                    <div><label className="text-[8px] font-black uppercase text-slate-400 mb-2 block text-center">Total Cliques</label><input name="clickCount" type="number" value={clickCount} onChange={(e) => setClickCount(Number(e.target.value))} className="w-full bg-white border-none rounded-xl p-4 font-black text-center text-lg sm:text-xl outline-none shadow-sm" /></div>
                                                )}
                                            </div>
                                            <div className={`grid ${monitorClicks ? 'grid-cols-2' : 'grid-cols-1'} gap-4 pt-4 border-t border-slate-200`}>
                                                <div className="text-center">
                                                    <div className="text-[8px] font-black uppercase text-slate-400 mb-2 block">Open Rate Calculado</div>
                                                    <div className="text-3xl sm:text-4xl font-black text-slate-900">{autoOpenRate}%</div>
                                                </div>
                                                {monitorClicks && (
                                                    <div className="text-center border-l border-slate-200">
                                                        <div className="text-[8px] font-black uppercase text-slate-400 mb-2 block">CTR Calculado</div>
                                                        <div className="text-3xl sm:text-4xl font-black text-indigo-600">{autoCtrRate}%</div>
                                                    </div>
                                                )}
                                            </div>
                                        </div>

                                        <button type="submit" className="w-full py-8 bg-black text-white rounded-[2.5rem] font-black uppercase text-xs tracking-[0.4em] active:scale-[0.98] shadow-2xl italic text-center">REGISTRAR OUTBOUND</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* MODAL EXCLUSÃO */}
                    {isDeleteModalOpen && (
                        <div className="fixed inset-0 bg-slate-900/90 backdrop-blur-sm z-[300] flex items-center justify-center p-4">
                            <div className="bg-white w-full max-w-md rounded-[2.5rem] p-10 shadow-2xl modal-animate text-center">
                                <div className="w-20 h-20 bg-red-50 text-red-500 rounded-full flex items-center justify-center mx-auto mb-6"><Icon name="trash-2" size={40} /></div>
                                <h3 className="text-2xl font-black uppercase italic tracking-tighter text-slate-900 mb-2 leading-none">Tem certeza?</h3>
                                <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-10 italic">Esta ação é irreversível.</p>
                                <div className="grid grid-cols-2 gap-4 mt-10">
                                    <button onClick={() => setIsDeleteModalOpen(false)} className="py-4 bg-slate-100 text-slate-400 rounded-2xl font-black uppercase text-[10px] tracking-widest italic">Cancelar</button>
                                    <button onClick={executeDelete} className="py-4 bg-red-500 text-white rounded-2xl font-black uppercase text-[10px] tracking-widest hover:bg-red-600 shadow-lg shadow-red-500/20 italic">Excluir</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* MODAL PLANEJAMENTO E AGENDA */}
                    {isModalAgendaOpen && (
                        <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-[150] flex items-center justify-center p-4">
                            <div className="bg-white w-full max-w-4xl rounded-[2rem] sm:rounded-[3rem] p-6 sm:p-12 shadow-2xl modal-animate relative max-h-[90vh] overflow-y-auto custom-scroll">
                                <button type="button" onClick={() => setIsModalAgendaOpen(false)} className="btn-close-modal"><Icon name="x" size={24} /></button>
                                <h3 className="text-3xl font-black italic uppercase leading-none tracking-tighter mb-10 text-slate-800">PLANEJAMENTO DE ATIVIDADE</h3>
                                
                                <form onSubmit={handleSaveAgenda} className="space-y-10">
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-10">
                                        <div className="space-y-8">
                                            <div><label className="text-[10px] font-black uppercase text-slate-400 mb-2 block font-bold">Atividade</label><input name="atividade" defaultValue={editingAgenda?.title} required className="w-full bg-slate-50 border-none rounded-2xl p-5 font-bold outline-none shadow-sm" /></div>
                                            <div><label className="text-[10px] font-black uppercase text-slate-400 mb-2 block font-bold">Sponsor Responsável</label><input name="sponsor" defaultValue={editingAgenda?.sponsor} required className="w-full bg-slate-50 border-none rounded-2xl p-5 font-bold outline-none shadow-sm" /></div>
                                            <div><label className="text-[10px] font-black uppercase text-slate-400 mb-2 block font-bold">Descrição / Briefing</label><textarea name="description" defaultValue={editingAgenda?.description} rows="4" className="w-full bg-slate-50 border-none rounded-2xl p-5 font-bold outline-none shadow-sm resize-none"></textarea></div>
                                            <div><label className="text-[10px] font-black uppercase text-slate-400 mb-2 block font-bold">Link da Reunião</label><div className="relative"><input name="meetingLink" defaultValue={editingAgenda?.meetingLink} className="w-full bg-slate-50 border-none rounded-xl p-5 pl-12 font-bold outline-none shadow-sm" placeholder="URL da videoconferência" /><Icon name="video" size={14} className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-300" /></div></div>
                                            <div className="grid grid-cols-2 gap-4">
                                                <div><label className="text-[10px] font-black uppercase text-slate-400 mb-2 block font-bold">Data Prevista</label><input name="date" type="date" defaultValue={editingAgenda?.date} required className="w-full bg-slate-50 border-none rounded-xl p-4 font-bold outline-none shadow-sm" /></div>
                                                <div><label className="text-[10px] font-black uppercase text-slate-400 mb-2 block font-bold">Status</label><select name="status" defaultValue={editingAgenda?.status || 'Planejado'} className="w-full bg-slate-50 border-none rounded-xl p-4 font-black outline-none shadow-sm"><option>Planejado</option><option>Em Progresso</option><option>Concluído</option><option>Cancelado</option></select></div>
                                            </div>
                                        </div>
                                        <div className="space-y-8">
                                            <div className="bg-[#f8fafc] p-6 sm:p-8 rounded-[2rem] sm:rounded-[3rem] border border-slate-100 shadow-inner">
                                                <div className="mb-6">
                                                    <label className="text-[10px] font-black uppercase text-slate-400 mb-2 block">Budget Alocado (R$)</label>
                                                    <div className="relative">
                                                        <span className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 font-black">R$</span>
                                                        <input 
                                                            type="text" 
                                                            value={formatCurrency(localBudget)} 
                                                            onChange={(e) => setLocalBudget(parseCurrency(e.target.value))} 
                                                            className="w-full bg-white border-none rounded-xl p-4 pl-12 font-black text-xl outline-none shadow-sm" 
                                                        />
                                                    </div>
                                                </div>
                                                <div className="space-y-4">
                                                    <div className="flex items-center justify-between"><label className="text-[10px] font-black uppercase text-slate-400">Fornecedores</label><button type="button" onClick={() => setVendorToggle(!vendorToggle)} className={`w-12 h-6 rounded-full transition-all relative ${vendorToggle ? 'bg-green-500' : 'bg-slate-300'}`}><div className={`absolute top-1 w-4 h-4 bg-white rounded-full transition-all ${vendorToggle ? 'right-1' : 'left-1'}`}></div></button></div>
                                                    {vendorToggle && (
                                                        <div className="space-y-3 mt-4">
                                                            {localVendors.map((v, i) => (
                                                                <div key={i} className={`flex flex-col gap-1 p-4 rounded-2xl transition-all border ${selectedVendorIndices.includes(i) ? 'bg-[#BED993]/20 border-[#BED993] shadow-sm' : 'border-slate-100 bg-white'}`}>
                                                                    <div className="flex gap-2 items-center">
                                                                        <input value={v.name} onChange={(e) => {const n=[...localVendors]; n[i].name=e.target.value; setLocalVendors(n)}} placeholder={`Fornecedor ${i+1}`} className="flex-1 bg-slate-50 p-3 rounded-lg text-[10px] font-bold outline-none border border-slate-100" />
                                                                        
                                                                        <div className="relative w-24 sm:w-28 flex-shrink-0">
                                                                            <span className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-[10px] font-bold">R$</span>
                                                                            <input 
                                                                                type="text" 
                                                                                value={formatCurrency(v.value)} 
                                                                                onChange={(e) => {const n=[...localVendors]; n[i].value=parseCurrency(e.target.value); setLocalVendors(n)}} 
                                                                                className="w-full bg-slate-50 p-3 pl-8 rounded-lg text-[10px] font-bold outline-none border border-slate-100" 
                                                                            />
                                                                        </div>
                                                                        
                                                                        <button type="button" onClick={() => toggleVendorSelection(i)} className={`p-2 rounded-lg transition-all ${selectedVendorIndices.includes(i) ? 'bg-[#BED993] text-black shadow-inner' : 'bg-slate-100 text-slate-400 hover:bg-slate-200'}`}>
                                                                            <Icon name="check" size={14} forceKey={`check-${selectedVendorIndices.includes(i)}`}/>
                                                                        </button>
                                                                        
                                                                        <button type="button" onClick={() => {
                                                                            const n = localVendors.filter((_, idx) => idx !== i);
                                                                            setLocalVendors(n);
                                                                            // Atualiza os indices marcados removendo o deletado e shiftando os maiores
                                                                            let newIndices = selectedVendorIndices.filter(idx => idx !== i);
                                                                            newIndices = newIndices.map(idx => idx > i ? idx - 1 : idx);
                                                                            setSelectedVendorIndices(newIndices);
                                                                        }} className="p-2 text-rose-400 hover:text-rose-600 transition-colors">
                                                                            <Icon name="trash-2" size={16}/>
                                                                        </button>
                                                                    </div>
                                                                    <div className="pl-1 mt-1">{renderIndividualSaving(v.value)}</div>
                                                                </div>
                                                            ))}
                                                            
                                                            <button type="button" onClick={() => setLocalVendors([...localVendors, { name: '', value: 0 }])} className="text-[#397394] text-[10px] font-black flex items-center gap-1 hover:underline mt-2">
                                                                <Icon name="plus" size={14}/> ADICIONAR FORNECEDOR
                                                            </button>

                                                            {/* Resumo Consolidado de Savings */}
                                                            {selectedVendorIndices.length > 0 && localBudget > 0 && (
                                                                <div className="mt-6 pt-6 border-t border-slate-200">
                                                                    <div className="flex justify-between items-end">
                                                                        <div>
                                                                            <div className="text-[9px] font-black uppercase text-slate-400 tracking-widest">Custo Total Selecionado</div>
                                                                            <div className="text-xl font-black text-slate-800 tracking-tight">R$ {formatCurrency(custoTotalSelecionado)}</div>
                                                                        </div>
                                                                        <div className="text-right">
                                                                            <div className="text-[9px] font-black uppercase text-slate-400 tracking-widest mb-1">Impacto Final (Saving)</div>
                                                                            {totalSaving > 0 && <span className="bg-emerald-100 text-emerald-700 px-3 py-1.5 rounded-lg text-[10px] font-black uppercase tracking-tighter shadow-inner">{(totalSaving).toFixed(1)}% DE ECONOMIA</span>}
                                                                            {totalSaving === 0 && <span className="bg-blue-100 text-blue-700 px-3 py-1.5 rounded-lg text-[10px] font-black uppercase tracking-tighter shadow-inner">100% DO RECURSO</span>}
                                                                            {totalSaving < 0 && <span className="bg-rose-100 text-rose-700 px-3 py-1.5 rounded-lg text-[10px] font-black uppercase tracking-tighter shadow-inner">{Math.abs(totalSaving).toFixed(1)}% ACIMA DO ORÇADO</span>}
                                                                        </div>
                                                                    </div>
                                                                </div>
                                                            )}
                                                        </div>
                                                    )}
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                    
                                    {/* Linha do NPS (Full Width) */}
                                    <div className="pt-8 border-t border-slate-100">
                                        <div className="flex items-center justify-between bg-slate-50 p-4 rounded-2xl border border-slate-100 w-full md:w-1/2 mb-6">
                                            <span className="text-[10px] font-black text-slate-400 uppercase">Incluir NPS?</span>
                                            <button type="button" onClick={() => setIncludeAgendaNPS(!includeAgendaNPS)}
                                                    className={`w-12 h-6 rounded-full transition-all relative ${includeAgendaNPS ? 'bg-indigo-600 shadow-lg shadow-indigo-100' : 'bg-slate-300'}`}>
                                                <div className={`absolute top-1 w-4 h-4 bg-white rounded-full transition-all ${includeAgendaNPS ? 'left-7' : 'left-1'}`}></div>
                                            </button>
                                        </div>

                                        {includeAgendaNPS && (
                                            <div className="bg-slate-50 rounded-[2.5rem] p-10 border-2 border-indigo-100/50 animate-in zoom-in-95 duration-200 shadow-inner w-full">
                                                <div className="flex items-center justify-between mb-8">
                                                    <h3 className="text-sm font-black text-slate-900 uppercase tracking-widest flex items-center gap-2">
                                                        <Icon name="smile" size={18} className="text-green-500"/> Definir NPS da Agenda
                                                    </h3>
                                                    <div className="flex items-center gap-2">
                                                        <span className={`px-4 py-1.5 rounded-full text-[10px] font-black uppercase ${reguaUtils.getNPSCategory(agendaNPSValue).bg} ${reguaUtils.getNPSCategory(agendaNPSValue).text}`}>
                                                            {reguaUtils.getNPSCategory(agendaNPSValue).label}
                                                        </span>
                                                    </div>
                                                </div>
                                                
                                                <div className="flex flex-wrap justify-between gap-2 md:flex-nowrap">
                                                    {[...Array(11).keys()].map(num => {
                                                        const cat = reguaUtils.getNPSCategory(num);
                                                        return (
                                                            <button key={num} type="button" onClick={() => setAgendaNPSValue(num)}
                                                                className={`flex-1 min-w-[45px] flex flex-col items-center gap-2 p-3 rounded-2xl transition-all border-2 ${
                                                                    agendaNPSValue === num 
                                                                    ? `${cat.color} text-white border-transparent scale-110 shadow-xl z-10` 
                                                                    : `bg-white ${cat.text} border-slate-100 hover:border-slate-300`
                                                                }`}>
                                                                <div className={agendaNPSValue === num ? 'text-white' : cat.text}>
                                                                    <Icon name={cat.iconName} size={20} forceKey={`agenda-nps-${agendaNPSValue === num ? 'y'+num : 'n'+num}`} />
                                                                </div>
                                                                <span className="text-xs font-black">{num}</span>
                                                            </button>
                                                        );
                                                    })}
                                                </div>
                                                
                                                <div className="grid grid-cols-3 mt-6 pt-6 border-t border-slate-200/50">
                                                    <div className="flex flex-col items-start gap-1">
                                                        <div className="w-full h-1.5 bg-red-500 rounded-full mb-1"></div>
                                                        <span className="text-[9px] font-black text-red-500 uppercase tracking-widest">Detratores (0-6)</span>
                                                    </div>
                                                    <div className="flex flex-col items-center gap-1">
                                                        <div className="w-2/3 h-1.5 bg-teal-500 rounded-full mb-1"></div>
                                                        <span className="text-[9px] font-black text-teal-600 uppercase tracking-widest">Neutros (7-8)</span>
                                                    </div>
                                                    <div className="flex flex-col items-end gap-1">
                                                        <div className="w-2/3 h-1.5 bg-green-500 rounded-full mb-1"></div>
                                                        <span className="text-[9px] font-black text-green-600 uppercase tracking-widest">Promotores (9-10)</span>
                                                    </div>
                                                </div>
                                            </div>
                                        )}
                                    </div>

                                    <button type="submit" className="w-full mt-4 py-6 bg-black text-white rounded-[2rem] font-black uppercase text-xs tracking-[0.4em] active:scale-[0.98] shadow-2xl italic text-center">SALVAR PLANEJAMENTO</button>
                                </form>
                            </div>
                        </div>
                    )}

                    <footer className="fixed bottom-0 w-full bg-white/95 backdrop-blur-md border-t border-slate-100 px-6 sm:px-10 py-5 flex flex-col sm:flex-row justify-between items-center text-[8px] sm:text-[9px] text-slate-300 font-black uppercase tracking-[0.4em] z-40 shadow-inner gap-2">
                        <div className="flex items-center gap-3 text-slate-400"><div className={`w-2.5 h-2.5 rounded-full ${user ? 'bg-green-500 shadow-[0_0_12px_rgba(34,197,94,0.3)]' : 'bg-slate-300 animate-pulse'}`}></div><span>© 2026 Unico Ops Hub. Ambiente Gold Ativo.</span></div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
