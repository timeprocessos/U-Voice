                                                <div className="text-[8px] sm:text-[11px] font-black text-slate-400 uppercase tracking-widest mt-2 sm:mt-3">Para Hoje</div>
                                            </div>
                                            <div className="bg-white p-5 sm:p-8 rounded-[1.5rem] sm:rounded-[3rem] border border-slate-100 shadow-sm transition-all hover:shadow-xl group col-span-1">
                                                <div className="text-3xl sm:text-5xl font-black text-emerald-500 sm:group-hover:scale-110 transition-transform origin-left">
                                                    {filteredReguas.reduce((acc, r) => acc + calculateTimeline(r).steps.filter(p => p.concluido).length, 0)}
                                                </div>
                                                <div className="text-[8px] sm:text-[11px] font-black text-slate-400 uppercase tracking-widest mt-2 sm:mt-3">Concluídos</div>
                                            </div>
                                            <div className="bg-slate-900 p-5 sm:p-8 rounded-[1.5rem] sm:rounded-[3rem] shadow-xl sm:shadow-2xl shadow-slate-200 transition-all hover:scale-[1.02] col-span-1">
                                                <div className="text-3xl sm:text-5xl font-black text-white">{filteredReguas.length}</div>
                                                <div className="text-[8px] sm:text-[11px] font-black text-slate-400 uppercase tracking-widest mt-2 sm:mt-3">Réguas Ativas</div>
                                            </div>
                                        </div>
                                    </>
                                )}

                                {/* NOVO FORMULÁRIO DE EDIÇÃO LINEAR */}
                                {isReguaEditorOpen && (
                                    <div className="bg-white rounded-[1.5rem] sm:rounded-[3rem] border border-slate-200 shadow-2xl p-6 sm:p-10 mb-8 animate-in fade-in duration-300">
                                        <div className="flex flex-col sm:flex-row sm:items-center justify-between mb-8 pb-6 border-b border-slate-100 gap-4">
                                            <h2 className="text-2xl sm:text-3xl font-black text-slate-800 uppercase tracking-tighter flex items-center gap-3">
                                                <Icon name="settings" className="text-indigo-600" size={28} /> {editingReguaId ? 'Editar Régua' : 'Nova Régua de Comunicação'}
                                            </h2>
                                            <button type="button" onClick={() => { setIsReguaEditorOpen(false); setEditingReguaId(null); setReguaFormData(getInitialReguaForm()); }} className="w-full sm:w-auto bg-slate-100 text-slate-500 px-6 py-3 rounded-xl font-bold uppercase tracking-widest text-[10px] hover:bg-slate-200 transition-colors text-center">Cancelar e Fechar</button>
                                        </div>
                                        
                                        <form onSubmit={handleSaveRegua} className="space-y-10">
                                            {/* Configurações Gerais */}
                                            <div>
                                                <h3 className="text-xs font-black uppercase tracking-widest text-slate-400 mb-4 flex items-center gap-2"><Icon name="info" size={14}/> Informações Básicas</h3>
                                                <div className="grid grid-cols-1 md:grid-cols-3 gap-6 bg-slate-50 p-6 sm:p-8 rounded-[1.5rem] border border-slate-100">
                                                    <div>
                                                        <label className="block text-[10px] font-black uppercase text-slate-500 mb-2 ml-1">Nome da Campanha</label>
                                                        <input required value={reguaFormData.nome} onChange={e => setReguaFormData({...reguaFormData, nome: e.target.value})} className="w-full bg-white border border-slate-200 rounded-xl p-4 outline-none focus:border-indigo-500 font-bold text-sm shadow-sm transition-colors" placeholder="Ex: Pesquisa de Clima Q3" />
                                                    </div>
                                                    <div>
                                                        <label className="block text-[10px] font-black uppercase text-slate-500 mb-2 ml-1">Público Alvo</label>
                                                        <div className="relative">
                                                            <select required value={reguaFormData.publico} onChange={e => setReguaFormData({...reguaFormData, publico: e.target.value})} className="w-full bg-white border border-slate-200 rounded-xl p-4 outline-none focus:border-indigo-500 text-sm shadow-sm transition-colors appearance-none cursor-pointer">
                                                                <option value="Interno (Seres)">Interno (Seres)</option>
                                                                <option value="Externo (Clientes)">Externo (Clientes)</option>
                                                            </select>
                                                            <Icon name="chevron-down" size={16} className="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none"/>
                                                        </div>
                                                    </div>
                                                    <div>
                                                        <label className="block text-[10px] font-black uppercase text-slate-500 mb-2 ml-1">Data Início (Marco Zero)</label>
                                                        <input type="date" required value={reguaFormData.dataInicio} onChange={e => setReguaFormData({...reguaFormData, dataInicio: e.target.value})} className="w-full bg-white border border-slate-200 rounded-xl p-4 outline-none focus:border-indigo-500 font-bold text-sm shadow-sm transition-colors" />
                                                    </div>
                                                </div>
                                            </div>

                                            {/* Configuração NPS */}
                                            <div>
                                                <div className="flex items-center justify-between mb-4">
                                                    <h3 className="text-xs font-black uppercase tracking-widest text-slate-400 flex items-center gap-2"><Icon name="smile" size={14}/> Expectativa de NPS</h3>
                                                    <div className="flex items-center gap-2 bg-slate-50 px-3 py-1.5 rounded-full border border-slate-200">
                                                        <span className="text-[10px] font-black text-slate-500 uppercase">Habilitar Metrifica?</span>
                                                        <button type="button" onClick={() => setReguaFormData({...reguaFormData, incluirNPS: !reguaFormData.incluirNPS})} className={`w-10 h-5 rounded-full transition-all relative ${reguaFormData.incluirNPS ? 'bg-green-500' : 'bg-slate-300'}`}>
                                                            <div className={`absolute top-1 w-3 h-3 bg-white rounded-full transition-all ${reguaFormData.incluirNPS ? 'left-6' : 'left-1'}`}></div>
                                                        </button>
                                                    </div>
                                                </div>
                                                {reguaFormData.incluirNPS && (
                                                    <div className="bg-slate-50 p-6 sm:p-8 rounded-[1.5rem] border border-green-100 shadow-inner flex flex-wrap sm:flex-nowrap justify-between gap-2">
                                                        {[...Array(11).keys()].map(num => {
                                                            const cat = reguaUtils.getNPSCategory(num);
                                                            return (
                                                                <button key={num} type="button" onClick={() => setReguaFormData({...reguaFormData, valorNPS: num})}
                                                                    className={`flex-1 min-w-[32px] sm:min-w-[45px] flex flex-col items-center gap-2 p-3 rounded-2xl transition-all border-2 ${
                                                                        reguaFormData.valorNPS === num ? `${cat.color} text-white border-transparent scale-110 shadow-lg z-10` : `bg-white ${cat.text} border-slate-100 hover:border-slate-300`
                                                                    }`}>
                                                                    <div className={reguaFormData.valorNPS === num ? 'text-white' : cat.text}><Icon name={cat.iconName} size={16}/></div>
                                                                    <span className="text-xs font-black">{num}</span>
                                                                </button>
                                                            );
                                                        })}
                                                    </div>
                                                )}
                                            </div>

                                            {/* Construtor de Etapas (Linear) */}
                                            <div className="pt-6 border-t border-slate-100">
                                                <div className="flex flex-col sm:flex-row sm:items-center justify-between mb-6 gap-4">
                                                    <h3 className="text-sm font-black uppercase tracking-widest text-slate-800 flex items-center gap-2"><Icon name="list" size={18}/> Passos de Comunicação</h3>
                                                    <button type="button" onClick={() => setReguaFormData({...reguaFormData, passos: [...reguaFormData.passos, { titulo: '', canal: 'Email', dataPrevista: reguaFormData.dataInicio, delayDias: 0, briefing: '', concluido: false }]})} className="w-full sm:w-auto text-[10px] font-black uppercase text-indigo-600 bg-indigo-50 px-5 py-3 rounded-xl hover:bg-indigo-100 transition-colors flex items-center justify-center gap-2 border border-indigo-100"><Icon name="plus" size={14}/> Adicionar Nova Etapa</button>
                                                </div>
                                                <div className="space-y-4">
                                                    {reguaFormData.passos.map((p, i) => (
                                                        <div key={i} className="flex flex-col md:flex-row gap-4 bg-white p-5 rounded-[1.5rem] border-2 border-slate-100 relative shadow-sm hover:border-indigo-100 transition-all group">
                                                            <div className="hidden md:flex shrink-0 w-8 h-8 bg-slate-900 text-white rounded-full items-center justify-center text-xs font-black shadow-md">{i+1}</div>
                                                            <div className="flex-1 grid grid-cols-1 md:grid-cols-12 gap-4">
                                                                <div className="md:col-span-4">
                                                                    <label className="block text-[9px] font-black uppercase text-slate-400 mb-1 ml-1">Assunto / Título</label>
                                                                    <input required value={p.titulo} onChange={e => { const newPassos = [...reguaFormData.passos]; newPassos[i].titulo = e.target.value; setReguaFormData({...reguaFormData, passos: newPassos}); }} className="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-sm font-bold outline-none focus:border-indigo-500 focus:bg-white transition-colors" placeholder="Ex: Bem-vindo!" />
                                                                </div>
                                                                <div className="md:col-span-2">
                                                                    <label className="block text-[9px] font-black uppercase text-slate-400 mb-1 ml-1">Canal</label>
                                                                    <div className="relative">
                                                                        <select value={p.canal} onChange={e => { const newPassos = [...reguaFormData.passos]; newPassos[i].canal = e.target.value; setReguaFormData({...reguaFormData, passos: newPassos}); }} className="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-sm font-bold outline-none focus:border-indigo-500 appearance-none cursor-pointer focus:bg-white transition-colors">
                                                                            <option>Email</option><option>WhatsApp</option><option>Push</option><option>Slack</option>
                                                                        </select>
                                                                        <Icon name="chevron-down" size={14} className="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none"/>
                                                                    </div>
                                                                </div>
                                                                <div className="md:col-span-4">
                                                                    <label className="block text-[9px] font-black uppercase text-slate-400 mb-1 ml-1">
                                                                        Data Disparo <span className="text-indigo-400 normal-case tracking-normal ml-0.5">(Sugestão T+: {reguaUtils.formatDate(reguaUtils.addDays(reguaFormData.dataInicio, Number(p.delayDias) || 0))})</span>
                                                                    </label>
                                                                    <input type="date" required value={p.dataPrevista} onChange={e => { const newPassos = [...reguaFormData.passos]; newPassos[i].dataPrevista = e.target.value; setReguaFormData({...reguaFormData, passos: newPassos}); }} className="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-sm font-bold outline-none focus:border-indigo-500 focus:bg-white transition-colors" />
                                                                </div>
                                                                <div className="md:col-span-2">
                                                                    <label className="block text-[9px] font-black uppercase text-slate-400 mb-1 ml-1">T+ (Ref.)</label>
                                                                    <div className="relative">
                                                                        <span className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 font-black text-[10px]">T+</span>
                                                                        <input type="number" min="0" value={p.delayDias} onChange={e => { const newPassos = [...reguaFormData.passos]; newPassos[i].delayDias = e.target.value; setReguaFormData({...reguaFormData, passos: newPassos}); }} className="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 pl-10 text-sm font-bold outline-none focus:border-indigo-500 focus:bg-white transition-colors" />
                                                                    </div>
                                                                </div>
                                                                
                                                                <div className="md:col-span-12">
                                                                    <label className="block text-[9px] font-black uppercase text-slate-400 mb-1 ml-1">Briefing / Conteúdo</label>
                                                                    <SmartTextArea value={p.briefing} onChange={e => { const newPassos = [...reguaFormData.passos]; newPassos[i].briefing = e.target.value; setReguaFormData({...reguaFormData, passos: newPassos}); }} rows={2} placeholder="Detalhes do que será enviado, links úteis..." />
                                                                </div>
                                                            </div>
                                                            <button type="button" onClick={() => { const newPassos = reguaFormData.passos.filter((_, idx) => idx !== i); setReguaFormData({...reguaFormData, passos: newPassos}); }} className="w-full md:w-12 h-12 md:h-auto bg-rose-50 border border-rose-100 text-rose-500 rounded-xl flex items-center justify-center hover:bg-rose-500 hover:text-white transition-colors shrink-0 mt-4 md:mt-0" title="Remover Etapa">
                                                                <Icon name="trash-2" size={18}/> <span className="md:hidden ml-2 font-black text-xs uppercase">Remover Etapa</span>
                                                            </button>
                                                        </div>
                                                    ))}
                                                    {reguaFormData.passos.length === 0 && (
                                                        <div className="text-center p-8 bg-slate-50 border border-dashed border-slate-200 rounded-2xl text-slate-400 text-sm font-bold">Nenhum passo adicionado. Use o botão acima para criar o fluxo.</div>
                                                    )}
                                                </div>
                                            </div>
                                            
                                            {/* Submit */}
                                            <div className="pt-8 border-t border-slate-200 flex flex-col sm:flex-row justify-end gap-4">
                                                <button type="button" onClick={() => { setIsReguaEditorOpen(false); setEditingReguaId(null); setReguaFormData(getInitialReguaForm()); }} className="w-full sm:w-auto px-10 py-4 sm:py-5 rounded-2xl font-bold uppercase tracking-widest text-[10px] sm:text-xs text-slate-500 bg-slate-100 hover:bg-slate-200 transition-colors">Cancelar e Voltar</button>
                                                <button type="submit" disabled={isSaving} className={`w-full sm:w-auto px-10 py-4 sm:py-5 rounded-2xl font-black uppercase tracking-widest text-[10px] sm:text-xs transition-all flex items-center justify-center gap-2 ${isSaving ? 'bg-slate-400 text-white cursor-not-allowed' : 'bg-black text-white hover:bg-indigo-600 shadow-xl'}`}>
                                                    {isSaving ? <><div className="spinner"></div> PROCESSANDO...</> : (editingReguaId ? 'Confirmar e Atualizar Régua' : 'Publicar Nova Régua')}
                                                </button>
                                            </div>
                                        </form>
                                    </div>
                                )}
                            </section>
                        )}
                    </main>

                    {/* ================= MODAIS (AGORA CORRETAMENTE ISOLADOS) ================= */}

                    {/* MODAL COMUNICADOS INTERNOS */}
                    {isModalCommOpen && (
                        <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-[150] flex items-center justify-center p-2 sm:p-4">
                            <div className="bg-white w-full max-w-4xl rounded-[1.5rem] sm:rounded-[3rem] p-5 sm:p-12 shadow-2xl modal-animate relative max-h-[95vh] overflow-y-auto custom-scroll">
                                <button type="button" onClick={() => setIsModalCommOpen(false)} className="btn-close-modal"><Icon name="x" size={20} className="sm:w-[24px] sm:h-[24px]"/></button>
                                <h3 className="text-2xl sm:text-3xl font-black italic uppercase leading-none tracking-tighter mb-8 sm:mb-10 text-slate-800 pr-10">registro de comunicação</h3>
                                <form onSubmit={handleSaveComm} className="grid grid-cols-1 md:grid-cols-2 gap-6 sm:gap-10">
                                    <div className="space-y-6 sm:space-y-8">
                                        <div><label className="text-[9px] sm:text-[10px] font-black uppercase text-slate-400 mb-2 block font-bold">Título Post</label><input name="title" defaultValue={editingComm?.title} required className="w-full bg-slate-50 border-none rounded-xl sm:rounded-2xl p-4 sm:p-5 font-bold text-base sm:text-lg outline-none shadow-sm" /></div>
                                        <div><label className="text-[9px] sm:text-[10px] font-black uppercase text-slate-400 mb-2 block font-bold">Link da Comunicação</label><div className="relative"><input name="commLink" defaultValue={editingComm?.commLink} className="w-full bg-slate-50 border-none rounded-xl p-4 sm:p-5 pl-10 sm:pl-12 font-bold outline-none shadow-sm text-sm" placeholder="URL da postagem" /><Icon name="link" size={14} className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-300" /></div></div>
                                        <div>
                                            <div className="flex items-center justify-between gap-3 mb-3">
                                                <label className="text-[9px] sm:text-[10px] font-black uppercase text-slate-400 block font-bold">Analistas</label>
                                                <button type="button" onClick={() => {const a = prompt("Nome do Novo Analista:"); if(a) setAllAnalysts(prev => [...prev, a])}} className="bg-yellow-400 p-2 rounded-lg text-black hover:scale-110 transition-transform shadow-md sm:shadow-lg flex items-center justify-center">
                                                    <Icon name="plus" size={14} className="font-bold" />
                                                </button>
                                            </div>
                                            <div className="flex flex-wrap gap-2">
                                                {allAnalysts.map(a => (
                                                    <div key={a} onClick={() => toggleAnalyst(a)} className={`checkbox-flag ${selectedAnalysts.includes(a) ? 'active' : ''}`}>
                                                        <Icon name={selectedAnalysts.includes(a) ? "check-circle-2" : "circle"} size={14} forceKey={selectedAnalysts.includes(a) ? 'y' : 'n'} />
                                                        {a}
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                        <div>
                                            <label className="text-[9px] sm:text-[10px] font-black uppercase text-slate-400 mb-3 block font-bold">Tipo de Conteúdo</label>
                                            <div className="flex flex-wrap gap-2">
                                                {FORMATOS_LIST.map(f => (
                                                    <div key={f} onClick={() => toggleFormat(f)} className={`checkbox-flag ${selectedFormats.includes(f) ? 'active' : ''}`}>
                                                        <Icon name={selectedFormats.includes(f) ? "check-circle-2" : "circle"} size={14} forceKey={`fmt-${selectedFormats.includes(f) ? 'y' : 'n'}-${f}`} />
                                                        {f}
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                        <div className="space-y-3 sm:space-y-4">
                                            <label className="text-[9px] sm:text-[10px] font-black uppercase text-slate-400 block font-bold">Canal de Envio (Padrão)</label>
                                            <div className="p-3 sm:p-4 rounded-xl border-2 border-[#4A154B] bg-[#4A154B] text-white shadow-md sm:shadow-lg flex items-center justify-center gap-2 sm:gap-3">
                                                <Icon name="slack" size={16} className="sm:w-[18px] sm:h-[18px]"/>
                                                <span className="text-[9px] sm:text-[10px] font-black uppercase">Slack Only</span>
                                            </div>
                                        </div>
                                        <div className="grid grid-cols-2 gap-3 sm:gap-4">
                                            <div><label className="text-[9px] sm:text-[10px] font-black uppercase text-slate-400 mb-2 block font-bold">Data</label><input name="date" type="date" defaultValue={editingComm?.date} required className="w-full bg-slate-50 border-none rounded-xl p-3 sm:p-4 font-bold outline-none shadow-sm text-xs sm:text-sm" /></div>
                                            <div><label className="text-[9px] sm:text-[10px] font-black uppercase text-slate-400 mb-2 block font-bold">Hora</label><input name="postTime" type="time" defaultValue={editingComm?.postTime} required className="w-full bg-slate-50 border-none rounded-xl p-3 sm:p-4 font-bold outline-none shadow-sm text-xs sm:text-sm" /></div>
                                        </div>
                                    </div>
                                    <div className="space-y-6 sm:space-y-8">
                                        <div className="bg-[#f8fafc] p-5 sm:p-10 rounded-[1.5rem] sm:rounded-[3rem] border border-slate-100 space-y-5 sm:space-y-6 shadow-inner">
                                            <div className="text-[9px] sm:text-[10px] font-black uppercase text-[#397394] tracking-widest italic flex items-center justify-center gap-2">Impacto Interno</div>
                                            
                                            <div className="grid grid-cols-3 gap-2 sm:gap-4">
                                                <div><label className="text-[7px] sm:text-[8px] uppercase text-slate-400 block italic text-center">Alcance</label><input name="views" type="number" value={commReach} onChange={(e) => setCommReach(Number(e.target.value))} className="w-full bg-white border border-slate-100 rounded-lg sm:rounded-xl p-3 sm:p-4 font-black text-center outline-none shadow-sm text-xs sm:text-sm" /></div>
                                                <div><label className="text-[7px] sm:text-[8px] uppercase text-slate-400 block italic text-center">Reações</label><input name="reactions" type="number" value={commReactions} onChange={(e) => setCommReactions(Number(e.target.value))} className="w-full bg-white border border-slate-100 rounded-lg sm:rounded-xl p-3 sm:p-4 font-black text-center outline-none shadow-sm text-xs sm:text-sm" /></div>
                                                <div><label className="text-[7px] sm:text-[8px] uppercase text-slate-400 block italic text-center">Comments</label><input name="comments" type="number" value={commComments} onChange={(e) => setCommComments(Number(e.target.value))} className="w-full bg-white border border-slate-100 rounded-lg sm:rounded-xl p-3 sm:p-4 font-black text-center outline-none shadow-sm text-xs sm:text-sm" /></div>
                                            </div>
                                            
                                            <div><label className="text-[9px] sm:text-[10px] font-black uppercase text-slate-400 block mb-2 italic text-center">Base Canal</label><input name="population" type="number" value={commPopulation} onChange={(e) => setCommPopulation(Number(e.target.value))} placeholder="Preencher" className="w-full bg-white border-none rounded-xl sm:rounded-2xl p-3 sm:p-4 font-black text-center outline-none shadow-sm text-xs sm:text-sm" /></div>
                                            
                                            <div className="grid grid-cols-2 gap-2 sm:gap-4 pt-4 border-t border-slate-200/50">
                                                <div className="text-center">
                                                    <div className="flex items-center justify-center gap-1 mb-1 relative group cursor-help">
                                                        <span className="text-[7px] sm:text-[8px] font-black uppercase text-slate-400 block">Taxa de Engaj. (TER)</span>
                                                        <Icon name="help-circle" size={10} className="text-slate-400 hover:text-indigo-500 transition-colors" />
                                                        <div className="absolute bottom-full mb-2 left-1/2 -translate-x-1/2 w-40 sm:w-48 bg-slate-900 text-white text-[8px] sm:text-[9px] font-medium normal-case tracking-normal p-2 sm:p-3 rounded-lg sm:rounded-xl shadow-xl opacity-0 group-hover:opacity-100 pointer-events-none transition-opacity z-50 text-center">
                                                            (Reações + Comentários) ÷ Alcance.<br/>Mede a conversão real de quem viu o post.
                                                            <div className="absolute top-full left-1/2 -translate-x-1/2 border-4 border-transparent border-t-slate-900"></div>
                                                        </div>
                                                    </div>
                                                    <span className="text-xl sm:text-2xl font-black text-indigo-600">{commReach > 0 ? (((commReactions + commComments) / commReach) * 100).toFixed(2) : "0.00"}%</span>
                                                </div>
                                                <div className="text-center border-l border-slate-200/50">
                                                    <div className="flex items-center justify-center gap-1 mb-1 relative group cursor-help">
                                                        <span className="text-[7px] sm:text-[8px] font-black uppercase text-slate-400 block">Taxa de Alcance (TA)</span>
                                                        <Icon name="help-circle" size={10} className="text-slate-400 hover:text-emerald-500 transition-colors" />
                                                        <div className="absolute bottom-full mb-2 left-1/2 -translate-x-1/2 w-40 sm:w-48 bg-slate-900 text-white text-[8px] sm:text-[9px] font-medium normal-case tracking-normal p-2 sm:p-3 rounded-lg sm:rounded-xl shadow-xl opacity-0 group-hover:opacity-100 pointer-events-none transition-opacity z-50 text-center">
                                                            Alcance ÷ Base Canal.<br/>Mede a penetração da mensagem na audiência total do canal.
                                                            <div className="absolute top-full left-1/2 -translate-x-1/2 border-4 border-transparent border-t-slate-900"></div>
                                                        </div>
                                                    </div>
                                                    <span className="text-xl sm:text-2xl font-black text-emerald-600">{commPopulation > 0 ? ((commReach / commPopulation) * 100).toFixed(2) : "0.00"}%</span>
                                                </div>
                                            </div>

                                            <div>
                                                <label className="text-[9px] sm:text-[10px] font-black uppercase text-slate-400 block mb-2 italic text-center">Notas de Performance / Comentários</label>
                                                <SmartTextArea name="notas" defaultValue={editingComm?.notas} rows={3} placeholder="Insira análises, formatações e links aqui..." />
                                            </div>
                                        </div>
                                        <div className="grid grid-cols-2 gap-3 sm:gap-4">

                                                                            <div className="text-[8px] sm:text-[9px] font-black uppercase text-slate-400 tracking-widest mb-1">Impacto Final (Saving)</div>
                                                                            {totalSaving > 0 && <span className="bg-emerald-100 text-emerald-700 px-2 sm:px-3 py-1 sm:py-1.5 rounded-lg text-[9px] sm:text-[10px] font-black uppercase tracking-tighter shadow-inner block sm:inline-block text-center w-full sm:w-auto">{(totalSaving).toFixed(1)}% DE ECONOMIA</span>}
                                                                            {totalSaving === 0 && <span className="bg-blue-100 text-blue-700 px-2 sm:px-3 py-1 sm:py-1.5 rounded-lg text-[9px] sm:text-[10px] font-black uppercase tracking-tighter shadow-inner block sm:inline-block text-center w-full sm:w-auto">100% DO RECURSO</span>}
                                                                            {totalSaving < 0 && <span className="bg-rose-100 text-rose-700 px-2 sm:px-3 py-1 sm:py-1.5 rounded-lg text-[9px] sm:text-[10px] font-black uppercase tracking-tighter shadow-inner block sm:inline-block text-center w-full sm:w-auto">{Math.abs(totalSaving).toFixed(1)}% ACIMA DO ORÇADO</span>}
                                                                        </div>
                                                                    </div>
                                                                </div>
                                                            )}
                                                        </div>
                                                    )}
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                    
                                    {/* Linha do NPS (Full Width) */}
                                    <div className="pt-6 sm:pt-8 border-t border-slate-100">
                                        <div className="flex items-center justify-between bg-slate-50 p-3.5 sm:p-4 rounded-xl sm:rounded-2xl border border-slate-100 w-full md:w-1/2 mb-4 sm:mb-6">
                                            <span className="text-[9px] sm:text-[10px] font-black text-slate-400 uppercase">Incluir NPS?</span>
                                            <button type="button" onClick={() => setIncludeAgendaNPS(!includeAgendaNPS)}
                                                    className={`w-10 sm:w-12 h-5 sm:h-6 rounded-full transition-all relative ${includeAgendaNPS ? 'bg-indigo-600 shadow-md sm:shadow-lg shadow-indigo-100' : 'bg-slate-300'}`}>
                                                <div className={`absolute top-1 w-3 sm:w-4 h-3 sm:h-4 bg-white rounded-full transition-all ${includeAgendaNPS ? 'left-6 sm:left-7' : 'left-1'}`}></div>
                                            </button>
                                        </div>

                                        {includeAgendaNPS && (
                                            <div className="bg-slate-50 rounded-[1.5rem] sm:rounded-[2.5rem] p-6 sm:p-10 border-2 border-indigo-100/50 animate-in zoom-in-95 duration-200 shadow-inner w-full">
                                                <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 sm:gap-0 mb-6 sm:mb-8">
                                                    <h3 className="text-xs sm:text-sm font-black text-slate-900 uppercase tracking-widest flex items-center gap-2">
                                                        <Icon name="smile" size={16} className="text-green-500 sm:w-[18px] sm:h-[18px]"/> Definir NPS da Agenda
                                                    </h3>
                                                    <div className="flex items-center gap-2">
                                                        <span className={`px-3 sm:px-4 py-1 sm:py-1.5 rounded-full text-[9px] sm:text-[10px] font-black uppercase ${reguaUtils.getNPSCategory(agendaNPSValue).bg} ${reguaUtils.getNPSCategory(agendaNPSValue).text}`}>
                                                            {reguaUtils.getNPSCategory(agendaNPSValue).label}
                                                        </span>
                                                    </div>
                                                </div>
                                                
                                                <div className="flex flex-wrap sm:flex-nowrap justify-between gap-1.5 sm:gap-2">
                                                    {[...Array(11).keys()].map(num => {
                                                        const cat = reguaUtils.getNPSCategory(num);
                                                        return (
                                                            <button key={num} type="button" onClick={() => setAgendaNPSValue(num)}
                                                                className={`flex-1 min-w-[28px] sm:min-w-[45px] flex flex-col items-center gap-1 sm:gap-2 p-2 sm:p-3 rounded-xl sm:rounded-2xl transition-all border-2 ${
                                                                    agendaNPSValue === num 
                                                                    ? `${cat.color} text-white border-transparent scale-110 shadow-lg z-10` 
                                                                    : `bg-white ${cat.text} border-slate-100 hover:border-slate-300`
                                                                }`}>
                                                                <div className={agendaNPSValue === num ? 'text-white' : cat.text}>
                                                                    <Icon name={cat.iconName} size={16} forceKey={`agenda-nps-${agendaNPSValue === num ? 'y'+num : 'n'+num}`} />
                                                                </div>
                                                                <span className="text-[10px] font-black">{num}</span>
                                                            </button>
                                                        );
                                                    })}
                                                </div>
                                                
                                                <div className="grid grid-cols-3 mt-4 pt-4 border-t border-slate-200/50">
                                                    <div className="flex flex-col items-start gap-1">
                                                        <div className="w-full h-1 bg-red-500 rounded-full mb-1"></div>
                                                        <span className="text-[8px] font-black text-red-500 uppercase tracking-widest">Detratores (0-6)</span>
                                                    </div>
                                                    <div className="flex flex-col items-center gap-1">
                                                        <div className="w-2/3 h-1 bg-teal-500 rounded-full mb-1"></div>
                                                        <span className="text-[8px] font-black text-teal-600 uppercase tracking-widest">Neutros (7-8)</span>
                                                    </div>
                                                    <div className="flex flex-col items-end gap-1">
                                                        <div className="w-2/3 h-1 bg-green-500 rounded-full mb-1"></div>
                                                        <span className="text-[8px] font-black text-green-600 uppercase tracking-widest">Promotores (9-10)</span>
                                                    </div>
                                                </div>
                                            </div>
                                        )}
                                    </div>

                                    <button type="submit" disabled={isSavingAgenda} className={`w-full mt-2 sm:mt-4 py-5 sm:py-6 rounded-[1.5rem] sm:rounded-[2rem] font-black uppercase text-[10px] sm:text-xs tracking-[0.2em] sm:tracking-[0.4em] active:scale-[0.98] shadow-2xl italic text-center flex items-center justify-center gap-2 transition-all ${isSavingAgenda ? 'bg-slate-400 text-white cursor-not-allowed' : 'bg-black text-white hover:bg-slate-800'}`}>
                                        {isSavingAgenda ? <><div className="spinner"></div> SALVANDO...</> : 'SALVAR PLANEJAMENTO'}
                                    </button>
                                </form>
                            </div>
                        </div>
                    )}

                    <footer className="w-full bg-white/95 backdrop-blur-md border-t border-slate-100 px-6 sm:px-10 py-5 flex flex-col sm:flex-row justify-between items-center text-[8px] sm:text-[9px] text-slate-300 font-black uppercase tracking-[0.4em] z-40 shadow-inner gap-2 relative sm:fixed sm:bottom-0">
                        <div className="flex items-center gap-3 text-slate-400"><div className={`w-2.5 h-2.5 rounded-full ${user ? 'bg-green-500 shadow-[0_0_12px_rgba(34,197,94,0.3)]' : 'bg-slate-300 animate-pulse'}`}></div><span>© 2026 Unico Ops Hub. Ambiente Gold Ativo.</span></div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
