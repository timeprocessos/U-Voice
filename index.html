<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>U-Voice | Hub de Operações</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #F8FAFC; margin: 0; padding: 0; }
        
        .overdue-pulse { animation: pulse-red 2s infinite; }
        @keyframes pulse-red {
            0%, 100% { color: #D22B2B; opacity: 1; }
            50% { color: #7f1d1d; opacity: .5; }
        }

        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #E2E8F0; border-radius: 10px; }
        
        .modal-animate { animation: slideUp 0.3s ease-out; }
        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .card-decision { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); border: 2px solid transparent; cursor: pointer; }
        .card-decision.selected { border-color: #BED993; background-color: #FBFAF3; transform: scale(1.01); }
        
        .impact-filter { background: white; border: 1px solid #F1F5F9; border-radius: 12px; padding: 8px 16px; font-size: 10px; font-weight: 900; text-transform: uppercase; color: #1e293b; outline: none; }
        
        .shadow-glow { box-shadow: 0 0 15px rgba(52, 211, 153, 0.4); }

        /* Estilo para Checkboxes (Flags) */
        .checkbox-flag {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
        }
        .checkbox-flag:hover { background: #f1f5f9; }
        .checkbox-flag.active {
            background: #397394;
            color: white;
            border-color: #397394;
        }

        @media (max-width: 640px) {
            .mobile-table-card { display: block; width: 100%; }
            .header-text { font-size: 3.5rem !important; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInAnonymously, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, onSnapshot, setDoc, deleteDoc, query, addDoc, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
            apiKey: "AIzaSyCRNpfVN3n_Ue9kocKSU7EGlp9ElBJWvRg",
            authDomain: "u-voice-82837.firebaseapp.com",
            projectId: "u-voice-82837",
            storageBucket: "u-voice-82837.firebasestorage.app",
            messagingSenderId: "363918476944",
            appId: "1:363918476944:web:02fe7e523c4eed24abba15"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'u-voice-prod-v12';

        window.FirebaseInstance = { 
            auth, db, appId, firebaseConfig,
            collection, doc, onSnapshot, setDoc, deleteDoc, addDoc, updateDoc, query, signInAnonymously, signInWithCustomToken, onAuthStateChanged 
        };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const BRAND = {
            sand1: '#FBFAF3', black: '#000000', primaryButton: '#397394',
            teaGreen: '#BED993', sunflower: '#FDC256', coral: '#F77D8D'
        };

        const EDITORIAS = ["Originais Unico", "Career Ops", "The Ops Playbook", "the ops story"];
        const FORMATOS = ["Vídeo", "Imagem", "GIF", "Texto", "Slide", "PDF"];
        
        const INITIAL_ANALYSTS = ["Aria Mori Dell Aringa", "Diego Francisco Rocha"];
        const INITIAL_CHANNELS = ["#news-ops-all-team", "#news-cx-team", "#news-analysis-team", "#news-onboarding-team", "#news-ops-leaders"];

        const UnicoLogo = ({ size = 34 }) => (
            <div className="bg-black rounded-xl flex items-center justify-center shadow-lg" style={{ width: size, height: size }}>
                <svg width={size * 0.6} height={size * 0.6} viewBox="0 0 100 100" fill="none">
                    <path d="M20 20V55C20 71.5685 33.4315 85 50 85C66.5685 85 80 71.5685 80 55V20H65V55C65 63.2843 58.2843 70 50 70C41.7157 70 35 63.2843 35 55V20H20Z" fill="white"/>
                </svg>
            </div>
        );

        const Icon = ({ name, size = 18, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    window.lucide.createIcons({
                        attrs: { class: className, style: `width: ${size}px; height: ${size}px;` },
                        name: name
                    });
                }
            }, [name, size, className]);
            return <span ref={iconRef} className="inline-flex items-center justify-center"><i data-lucide={name}></i></span>;
        };

        function SimpleBarChart({ data, title, color = "#397394" }) {
            const maxVal = Math.max(...Object.values(data), 1);
            return (
                <div className="bg-white p-6 rounded-[2rem] border border-slate-100 shadow-sm w-full">
                    <h4 className="text-[10px] font-black uppercase text-slate-400 mb-6 tracking-widest">{title}</h4>
                    <div className="space-y-4">
                        {Object.entries(data).map(([key, val]) => (
                            <div key={key} className="space-y-1">
                                <div className="flex justify-between text-[8px] font-black uppercase text-slate-500">
                                    <span>{key}</span>
                                    <span>{val}</span>
                                </div>
                                <div className="h-2 bg-slate-50 rounded-full overflow-hidden">
                                    <div className="h-full rounded-full transition-all duration-1000" style={{ width: `${(val/maxVal)*100}%`, backgroundColor: color }}></div>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        function App() {
            const fb = window.FirebaseInstance || {};
            const { auth, db, appId, collection, doc, onSnapshot, setDoc, deleteDoc, addDoc, updateDoc, signInAnonymously, signInWithCustomToken, onAuthStateChanged } = fb;

            const [user, setUser] = useState(null);
            const [activeTab, setActiveTab] = useState('comunicados');
            const [comms, setComms] = useState([]);
            const [agenda, setAgenda] = useState([]);
            const [isModalCommOpen, setIsModalCommOpen] = useState(false);
            const [isModalAgendaOpen, setIsModalAgendaOpen] = useState(false);
            
            const [editingComm, setEditingComm] = useState(null);
            const [editingAgenda, setEditingAgenda] = useState(null);
            const [vendorToggle, setVendorToggle] = useState(false);
            const [selectedVendorIdx, setSelectedVendorIdx] = useState(null);
            const [selectedFormats, setSelectedFormats] = useState([]);
            
            // Novos estados para Analistas e Canais
            const [selectedAnalysts, setSelectedAnalysts] = useState([]);
            const [channelsList, setChannelsList] = useState(INITIAL_CHANNELS);

            useEffect(() => {
                const startAuth = async () => {
                    if (!auth) return;
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            try { await signInWithCustomToken(auth, __initial_auth_token); } catch (e) { await signInAnonymously(auth); }
                        } else { await signInAnonymously(auth); }
                    } catch (e) { console.error(e); }
                };
                startAuth();
                const unsubscribe = onAuthStateChanged(auth, setUser);
                return () => unsubscribe();
            }, [auth]);

            useEffect(() => {
                if (!user || !db) return;
                const unsubComms = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'comms'), (snap) => {
                    setComms(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                });
                const unsubAgenda = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'agenda'), (snap) => {
                    setAgenda(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                });
                return () => { unsubComms(); unsubAgenda(); };
            }, [user, db, appId]);

            const calculateScore = (reactions = 0, comments = 0, population = 126, posts = 1) => {
                if (!population || population === 0) return 0;
                return ((((Number(reactions) * 1) + (Number(comments) * 2)) / (Number(population) * Number(posts))) * 100).toFixed(1);
            };

            const toggleAnalyst = (name) => {
                setSelectedAnalysts(prev => prev.includes(name) ? prev.filter(n => n !== name) : [...prev, name]);
            };

            const toggleFormat = (f) => {
                setSelectedFormats(prev => prev.includes(f) ? prev.filter(item => item !== f) : [...prev, f]);
            };

            const addNewChannel = () => {
                const name = prompt("Digite o nome do novo canal:");
                if (name && name.trim()) {
                    const cleanName = name.startsWith('#') ? name.trim() : '#' + name.trim();
                    if (!channelsList.includes(cleanName)) {
                        setChannelsList([...channelsList, cleanName]);
                    }
                }
            };

            const handleSaveComm = async (e) => {
                e.preventDefault();
                const fd = new FormData(e.target);
                const data = {
                    title: fd.get('title'),
                    channelName: fd.get('channelName'),
                    link: fd.get('link'),
                    date: fd.get('date'),
                    postTime: fd.get('postTime'),
                    editoria: fd.get('editoria'),
                    analysts: selectedAnalysts, // Salvando array de analistas
                    formats: selectedFormats,
                    medium: fd.get('medium'),
                    status: fd.get('status'),
                    population: Number(fd.get('population') || 126),
                    views: Number(fd.get('views') || 0),
                    reactions: Number(fd.get('reactions') || 0),
                    comments: Number(fd.get('comments') || 0),
                    updatedAt: new Date().toISOString()
                };

                try {
                    if (editingComm) {
                        await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'comms', editingComm.id), data);
                    } else {
                        await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'comms'), data);
                    }
                    setIsModalCommOpen(false);
                    setEditingComm(null);
                    setSelectedFormats([]);
                    setSelectedAnalysts([]);
                } catch (error) { console.error("Erro ao salvar:", error); }
            };

            const handleSaveAgenda = async (e) => {
                e.preventDefault();
                const fd = new FormData(e.target);
                const data = {
                    title: fd.get('atividade'),
                    date: fd.get('date'),
                    sponsor: fd.get('sponsor'),
                    description: fd.get('description'),
                    inviteLink: fd.get('inviteLink'),
                    status: fd.get('status'),
                    hasVendor: vendorToggle,
                    selectedVendorIdx: selectedVendorIdx !== null ? selectedVendorIdx : -1,
                    vendor1: fd.get('v1') || '',
                    vendor2: fd.get('v2') || '',
                    vendor3: fd.get('v3') || '',
                    updatedAt: new Date().toISOString()
                };

                try {
                    if (editingAgenda) {
                        await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'agenda', editingAgenda.id), data);
                    } else {
                        await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'agenda'), data);
                    }
                    setIsModalAgendaOpen(false);
                    setEditingAgenda(null);
                } catch (error) { console.error("Erro ao salvar agenda:", error); }
            };

            const statsImpacto = useMemo(() => {
                const totalPosts = comms.filter(c => c.status === 'Enviado').length;
                const interactions = comms.reduce((acc, c) => acc + (Number(c.reactions) || 0) + (Number(c.comments) || 0), 0);
                const totalComments = comms.reduce((acc, c) => acc + (Number(c.comments) || 0), 0);
                const avgScore = totalPosts > 0 
                    ? (comms.reduce((acc, c) => acc + Number(calculateScore(c.reactions, c.comments, c.population)), 0) / (comms.length || 1)).toFixed(1)
                    : "0.0";

                const formatDistribution = FORMATOS.reduce((acc, f) => {
                    acc[f] = comms.filter(c => c.formats?.includes(f)).length;
                    return acc;
                }, {});

                const editoriaDistribution = EDITORIAS.reduce((acc, ed) => {
                    acc[ed] = comms.filter(c => c.editoria === ed).length;
                    return acc;
                }, {});

                return { totalPosts, interactions, totalComments, avgScore, formatDistribution, editoriaDistribution };
            }, [comms]);

            return (
                <div className="min-h-screen pb-24">
                    <nav className="bg-white border-b px-4 sm:px-8 py-4 sm:py-5 flex flex-wrap justify-between items-center sticky top-0 z-50 shadow-sm gap-4">
                        <div className="flex items-center gap-3 sm:gap-6">
                            <div className="flex items-center gap-2 sm:gap-4">
                                <UnicoLogo size={36} />
                                <h1 className="text-lg sm:text-2xl font-black italic uppercase tracking-tighter leading-none">U-Voice</h1>
                            </div>
                        </div>
                        <div className="flex bg-slate-100 p-1 rounded-full gap-1 overflow-x-auto max-w-full">
                            {['comunicados', 'agenda', 'impacto'].map(tab => (
                                <button key={tab} onClick={() => setActiveTab(tab)} className={`px-4 sm:px-8 py-2 sm:py-2.5 rounded-full text-[9px] sm:text-[10px] font-black uppercase transition-all whitespace-nowrap ${activeTab === tab ? 'bg-black text-white shadow-lg' : 'text-slate-400 hover:text-slate-600'}`}>{tab}</button>
                            ))}
                        </div>
                    </nav>

                    <main className="max-w-7xl mx-auto px-4 sm:px-8 py-8 sm:py-12">
                        <header className="mb-8 sm:mb-12">
                            <h2 className="text-4xl sm:text-6xl md:text-8xl font-black italic tracking-tighter leading-tight header-text">by the numbers.</h2>
                            <p className="text-slate-400 font-black uppercase text-[10px] sm:text-xs tracking-[0.4em] mt-2 sm:mt-4 ml-1 italic">Insights Estratégicos e Governança</p>
                        </header>

                        {activeTab === 'comunicados' && (
                            <section className="animate-in fade-in duration-500">
                                <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 sm:mb-8 gap-4">
                                    <h3 className="text-xl sm:text-2xl font-black uppercase italic text-slate-800 tracking-tighter">Fluxo de Comunicados</h3>
                                    <button onClick={() => { setEditingComm(null); setSelectedFormats([]); setSelectedAnalysts([]); setIsModalCommOpen(true); }} className="w-full sm:w-auto bg-[#397394] text-white px-8 py-4 rounded-2xl text-[10px] font-black uppercase flex items-center justify-center gap-2 shadow-xl active:scale-95 transition-all"><Icon name="plus" size={14} /> Adicionar Comunicado</button>
                                </div>

                                <div className="bg-white rounded-[2rem] sm:rounded-[3rem] border border-slate-100 overflow-hidden shadow-sm">
                                    <div className="overflow-x-auto custom-scroll">
                                        <table className="w-full text-left min-w-[700px]">
                                            <thead className="bg-slate-50/50 border-b border-slate-100">
                                                <tr className="text-[9px] sm:text-[10px] font-black uppercase text-slate-400 tracking-widest">
                                                    <th className="px-6 sm:px-10 py-4 sm:py-6">Item / Editoria</th>
                                                    <th className="px-6 sm:px-10 py-4 sm:py-6 text-center">Analistas / Canal</th>
                                                    <th className="px-6 sm:px-10 py-4 sm:py-6 text-right">Métricas</th>
                                                    <th className="px-6 sm:px-10 py-4 sm:py-6 w-32 sm:w-44 text-right"></th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-50">
                                                {comms.length === 0 ? (
                                                    <tr><td colSpan="4" className="p-20 sm:p-32 text-center text-slate-200 font-black uppercase tracking-widest text-xs italic">Aguardando novos registos...</td></tr>
                                                ) : comms.map(c => (
                                                    <tr key={c.id} className="hover:bg-slate-50/50 transition-colors group">
                                                        <td className="px-6 sm:px-10 py-6 sm:py-8">
                                                            <div className="flex items-center gap-3 sm:gap-5">
                                                                <div className="p-2 sm:p-3 bg-slate-50 rounded-xl text-slate-300">
                                                                    {c.medium === 'Slack' ? <Icon name="slack" size={18} /> : <Icon name="mail" size={18} />}
                                                                </div>
                                                                <div>
                                                                    <div className="font-black uppercase italic text-base sm:text-xl text-slate-800 leading-none">{c.title}</div>
                                                                    <div className="flex items-center gap-2 mt-1 sm:mt-2">
                                                                        <span className="text-[8px] sm:text-[9px] font-black text-[#397394] bg-blue-50 px-2 py-0.5 rounded-md uppercase tracking-tighter italic">{c.editoria || 'Geral'}</span>
                                                                        <span className="text-[8px] sm:text-[9px] font-bold text-slate-300 uppercase tracking-tighter">{c.postTime}</span>
                                                                    </div>
                                                                </div>
                                                            </div>
                                                        </td>
                                                        <td className="px-6 sm:px-10 py-6 sm:py-8 text-center">
                                                            <div className="flex flex-col items-center gap-2">
                                                                <div className="flex flex-wrap justify-center gap-1">
                                                                    {c.analysts?.map(a => (
                                                                        <span key={a} className="text-[7px] font-black bg-slate-100 text-slate-500 px-2 py-0.5 rounded uppercase">{a.split(' ')[0]}</span>
                                                                    ))}
                                                                </div>
                                                                <div className="flex items-center justify-center gap-3">
                                                                    <span className="text-[8px] sm:text-[9px] font-black text-slate-400 italic tracking-tighter">{c.channelName || '--'}</span>
                                                                    <span className={`px-2 py-0.5 rounded-full text-[7px] sm:text-[8px] font-black uppercase ${c.status === 'Enviado' ? 'bg-emerald-100 text-emerald-700' : 'bg-amber-100 text-amber-700'}`}>{c.status || 'STATUS'}</span>
                                                                </div>
                                                            </div>
                                                        </td>
                                                        <td className="px-6 sm:px-10 py-6 sm:py-8 text-right">
                                                            <div className="font-black text-xl sm:text-3xl text-slate-900 tracking-tighter leading-none">{calculateScore(c.reactions, c.comments, c.population)}%</div>
                                                            <div className="flex justify-end items-center gap-3 sm:gap-4 mt-2 sm:mt-3 opacity-60 italic">
                                                                <span title="Visitas" className="flex items-center gap-1 text-[8px] sm:text-[9px] font-black uppercase tracking-widest"><Icon name="eye" size={10}/> {c.views || 0}</span>
                                                                <span title="Reações" className="flex items-center gap-1 text-[8px] sm:text-[9px] font-black uppercase tracking-widest"><Icon name="thumbs-up" size={10}/> {c.reactions || 0}</span>
                                                                <span title="Comentários" className="flex items-center gap-1 text-[8px] sm:text-[9px] font-black uppercase tracking-widest"><Icon name="message-square" size={10}/> {c.comments || 0}</span>
                                                            </div>
                                                        </td>
                                                        <td className="px-6 sm:px-10 py-6 sm:py-8 text-right">
                                                            <div className="flex items-center justify-end gap-1 sm:gap-2">
                                                                {c.link && (
                                                                    <a href={c.link} target="_blank" className="p-2 sm:p-3 text-slate-300 hover:text-[#397394] hover:bg-blue-50 rounded-2xl transition-all"><Icon name="link" size={18} /></a>
                                                                )}
                                                                <button onClick={() => { 
                                                                    setEditingComm(c); 
                                                                    setSelectedFormats(c.formats || []); 
                                                                    setSelectedAnalysts(c.analysts || []);
                                                                    setIsModalCommOpen(true); 
                                                                }} className="p-2 sm:p-3 text-slate-700 hover:text-blue-500 hover:bg-white rounded-2xl transition-all"><Icon name="pencil" size={18} /></button>
                                                                <button onClick={() => deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'comms', c.id))} className="p-2 sm:p-3 text-slate-200 hover:text-red-500 hover:bg-red-50 rounded-2xl transition-all"><Icon name="trash-2" size={18} /></button>
                                                            </div>
                                                        </td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </section>
                        )}

                        {activeTab === 'agenda' && (
                            <section className="animate-in fade-in duration-500">
                                <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 sm:mb-10 gap-4">
                                    <h3 className="text-xl sm:text-2xl font-black uppercase italic text-slate-800 tracking-tighter">Planeamento de Operações</h3>
                                    <button onClick={() => { setEditingAgenda(null); setVendorToggle(false); setSelectedVendorIdx(null); setIsModalAgendaOpen(true); }} className="w-full sm:w-auto bg-[#397394] text-white px-8 py-4 rounded-2xl text-[10px] font-black uppercase flex items-center justify-center gap-2 shadow-xl active:scale-95 transition-all"><Icon name="calendar" size={14} /> Novo Planeamento</button>
                                </div>
                                <div className="bg-white rounded-[2rem] sm:rounded-[3rem] border border-slate-100 overflow-hidden shadow-sm">
                                    <div className="overflow-x-auto custom-scroll">
                                        <table className="w-full text-left min-w-[700px]">
                                            <thead className="bg-slate-50 border-b">
                                                <tr className="text-[10px] font-black uppercase text-slate-400 tracking-widest"><th className="px-10 py-6">Atividade / Sponsor</th><th className="px-10 py-6 text-center">Data</th><th className="px-10 py-6 text-center">STATUS</th><th className="px-10 py-6 w-32 text-right"></th></tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-50">
                                                {agenda.map(ev => (
                                                    <tr key={ev.id} className="hover:bg-slate-50 transition-colors">
                                                        <td className="px-10 py-8">
                                                            <div className="font-black uppercase italic text-base sm:text-xl text-slate-800 leading-none">{ev.title}</div>
                                                            <div className="text-[8px] sm:text-[9px] font-bold text-slate-400 uppercase mt-2 tracking-widest italic">{ev.sponsor} • {ev.hasVendor && ev.selectedVendorIdx >= 0 ? `FORNECEDOR ELEITO: ${ev['vendor'+(ev.selectedVendorIdx+1)]}` : 'EQUIPA INTERNA'}</div>
                                                        </td>
                                                        <td className="px-10 py-8 text-center text-xs font-bold text-slate-500">{ev.date ? new Date(ev.date).toLocaleDateString('pt-BR') : '--'}</td>
                                                        <td className="px-10 py-8 text-center"><span className="px-4 py-1.5 bg-blue-50 text-blue-700 text-[9px] font-black uppercase rounded-full">{ev.status || 'STATUS'}</span></td>
                                                        <td className="px-10 py-8 text-right">
                                                            <div className="flex items-center justify-end gap-2">
                                                                <button onClick={() => { setEditingAgenda(ev); setVendorToggle(ev.hasVendor); setSelectedVendorIdx(ev.selectedVendorIdx >= 0 ? ev.selectedVendorIdx : null); setIsModalAgendaOpen(true); }} className="p-3 text-slate-700 hover:text-blue-600 hover:bg-white rounded-2xl shadow-sm transition-all"><Icon name="pencil" size={18} /></button>
                                                                <button onClick={() => deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'agenda', ev.id))} className="p-3 text-slate-200 hover:text-red-500 hover:bg-red-50 rounded-2xl transition-all"><Icon name="trash-2" size={18} /></button>
                                                            </div>
                                                        </td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </section>
                        )}

                        {activeTab === 'impacto' && (
                            <section className="animate-in fade-in duration-500 space-y-8 sm:space-y-10 text-left">
                                <div className="flex flex-wrap items-center gap-3 sm:gap-4 bg-white p-3 rounded-[1.5rem] border border-slate-100 shadow-sm w-fit">
                                    <div className="flex items-center gap-2 px-3 sm:px-4 py-2 bg-slate-50 rounded-xl border border-slate-100">
                                        <Icon name="filter" size={12} className="text-slate-400" />
                                        <span className="text-[8px] sm:text-[9px] font-black uppercase text-slate-400 tracking-widest">Ciclo</span>
                                    </div>
                                    <select className="impact-filter"><option>2025</option><option>2026</option></select>
                                    <select className="impact-filter"><option>Todos Canais</option><option>Slack</option><option>E-mail</option></select>
                                </div>

                                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 sm:gap-6">
                                    <div className="p-8 sm:p-10 bg-white rounded-[2.5rem] sm:rounded-[3rem] border border-slate-100 shadow-sm group hover:scale-[1.02] transition-all">
                                        <div className="p-3 bg-slate-50 rounded-xl w-fit mb-4 sm:mb-6 text-slate-300"><Icon name="file-text" size={24} /></div>
                                        <div className="text-4xl sm:text-6xl font-black text-slate-900 tracking-tighter">{statsImpacto.totalPosts}</div>
                                        <div className="text-[8px] sm:text-[9px] font-black uppercase text-slate-400 tracking-widest mt-2">Total Posts</div>
                                    </div>
                                    <div className="p-8 sm:p-10 bg-slate-900 rounded-[2.5rem] sm:rounded-[3rem] shadow-2xl relative overflow-hidden group hover:scale-[1.02] transition-all">
                                        <div className="absolute top-6 sm:top-8 right-6 sm:right-8 bg-emerald-400 text-slate-950 text-[8px] font-black px-2 py-0.5 rounded-full uppercase tracking-tighter shadow-glow italic">Target</div>
                                        <div className="p-3 bg-white/10 rounded-xl w-fit mb-4 sm:mb-6 text-white"><Icon name="trending-up" size={24} /></div>
                                        <div className="text-4xl sm:text-6xl font-black text-white tracking-tighter">{statsImpacto.interactions}</div>
                                        <div className="text-[8px] sm:text-[9px] font-black uppercase text-slate-500 tracking-widest mt-2">Interações Totais</div>
                                    </div>
                                    <div className="p-8 sm:p-10 bg-white rounded-[2.5rem] sm:rounded-[3rem] border border-slate-100 shadow-sm hover:scale-[1.02] transition-all">
                                        <div className="p-3 bg-red-50 rounded-xl w-fit mb-4 sm:mb-6 text-red-300"><Icon name="message-circle" size={24} /></div>
                                        <div className="text-4xl sm:text-6xl font-black text-slate-900 tracking-tighter">{statsImpacto.totalComments}</div>
                                        <div className="text-[8px] sm:text-[9px] font-black uppercase text-slate-400 tracking-widest mt-2">Comments Total</div>
                                    </div>
                                    <div className="p-8 sm:p-10 bg-[#FBFAF3] rounded-[2.5rem] sm:rounded-[3rem] border border-[#F0EEE6] shadow-sm hover:scale-[1.02] transition-all">
                                        <div className="p-3 bg-slate-900 text-white rounded-xl w-fit mb-4 sm:mb-6"><Icon name="zap" size={24} /></div>
                                        <div className="text-4xl sm:text-6xl font-black text-slate-900 tracking-tighter">{statsImpacto.avgScore}%</div>
                                        <div className="text-[8px] sm:text-[9px] font-black uppercase text-slate-400 tracking-widest mt-2">Score Engaja</div>
                                    </div>
                                </div>

                                <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 sm:gap-8">
                                    <SimpleBarChart title="Distribuição por Formato" data={statsImpacto.formatDistribution} color="#397394" />
                                    <SimpleBarChart title="Distribuição por Editoria" data={statsImpacto.editoriaDistribution} color="#BED993" />
                                </div>
                            </section>
                        )}
                    </main>

                    {/* MODAIS RESPONSIVOS */}
                    {isModalCommOpen && (
                        <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-[100] flex items-center justify-center p-2 sm:p-4">
                            <div className="bg-white w-full max-w-4xl rounded-[2.5rem] sm:rounded-[4rem] p-6 sm:p-12 shadow-2xl modal-animate relative max-h-[95vh] overflow-y-auto custom-scroll text-left">
                                <div className="flex justify-between items-center mb-8 sm:mb-10 sticky top-0 bg-white z-10 py-2 border-b border-slate-50 sm:border-none">
                                    <h3 className="text-xl sm:text-3xl font-black italic uppercase leading-none tracking-tighter text-slate-800">Registo de Comunicado</h3>
                                    <button onClick={() => setIsModalCommOpen(false)} className="p-2 sm:p-3 bg-slate-50 rounded-full hover:text-red-500 transition-all active:scale-90"><Icon name="x" size={24} /></button>
                                </div>
                                <form onSubmit={handleSaveComm} className="grid grid-cols-1 md:grid-cols-2 gap-6 sm:gap-10">
                                    <div className="space-y-6 sm:space-y-8">
                                        <div><label className="text-[9px] sm:text-[10px] font-black uppercase text-slate-400 mb-2 block tracking-widest italic font-bold">Título do Post</label><input name="title" defaultValue={editingComm?.title} required className="w-full bg-slate-50 border-none rounded-xl sm:rounded-2xl p-4 sm:p-5 font-bold text-base sm:text-lg text-slate-800 outline-none focus:ring-4 ring-blue-50 shadow-sm" /></div>
                                        
                                        {/* Analistas Responsáveis com Flags */}
                                        <div>
                                            <label className="text-[9px] sm:text-[10px] font-black uppercase text-slate-400 mb-3 block tracking-widest italic font-bold">Analistas Responsáveis</label>
                                            <div className="flex flex-wrap gap-2">
                                                {INITIAL_ANALYSTS.map(a => (
                                                    <div 
                                                        key={a} 
                                                        onClick={() => toggleAnalyst(a)} 
                                                        className={`checkbox-flag ${selectedAnalysts.includes(a) ? 'active' : ''}`}
                                                    >
                                                        <Icon name={selectedAnalysts.includes(a) ? "check-circle-2" : "circle"} size={14} />
                                                        {a}
                                                    </div>
                                                ))}
                                            </div>
                                        </div>

                                        <div className="grid grid-cols-2 gap-4">
                                            <div><label className="text-[9px] sm:text-[10px] font-black uppercase text-slate-400 mb-2 block tracking-widest italic font-bold">Data Prevista</label><input name="date" type="date" defaultValue={editingComm?.date} required className="w-full bg-slate-50 border-none rounded-xl sm:rounded-2xl p-4 sm:p-5 font-bold outline-none" /></div>
                                            <div><label className="text-[9px] sm:text-[10px] font-black uppercase text-slate-400 mb-2 block tracking-widest italic font-bold">Horário</label><input name="postTime" type="time" defaultValue={editingComm?.postTime} className="w-full bg-slate-50 border-none rounded-xl sm:rounded-2xl p-4 sm:p-5 font-bold outline-none text-slate-500" /></div>
                                        </div>
                                        
                                        <div><label className="text-[9px] sm:text-[10px] font-black uppercase text-slate-400 mb-2 block tracking-widest italic font-bold">Editoria</label><select name="editoria" defaultValue={editingComm?.editoria || EDITORIAS[0]} className="w-full bg-slate-50 border-none rounded-xl sm:rounded-2xl p-4 sm:p-5 font-bold outline-none cursor-pointer tracking-tighter font-black">{EDITORIAS.map(e => <option key={e}>{e}</option>)}</select></div>
                                        
                                        <div className="grid grid-cols-1 sm:grid-cols-1 gap-4">
                                            <div className="flex items-end gap-2">
                                                <div className="flex-1">
                                                    <label className="text-[9px] sm:text-[10px] font-black uppercase text-slate-400 mb-2 block tracking-widest italic font-bold">Canal Slack</label>
                                                    <select name="channelName" defaultValue={editingComm?.channelName || channelsList[0]} className="w-full bg-slate-50 border-none rounded-xl sm:rounded-2xl p-4 sm:p-5 font-bold outline-none font-black tracking-tighter appearance-none">
                                                        {channelsList.map(ch => <option key={ch} value={ch}>{ch}</option>)}
                                                    </select>
                                                </div>
                                                <button type="button" onClick={addNewChannel} className="p-4 sm:p-5 bg-slate-900 text-white rounded-xl sm:rounded-2xl hover:bg-black transition-all shadow-lg active:scale-95 mb-[1px]">
                                                    <Icon name="plus" size={18} />
                                                </button>
                                            </div>
                                            <div className="mt-2"><label className="text-[9px] sm:text-[10px] font-black uppercase text-slate-400 mb-2 block tracking-widest italic font-bold">Meio</label><select name="medium" defaultValue={editingComm?.medium || 'Slack'} className="w-full bg-slate-50 border-none rounded-xl sm:rounded-2xl p-4 sm:p-5 font-bold outline-none cursor-pointer"><option>Slack</option><option>E-mail</option></select></div>
                                        </div>
                                        
                                        <div><label className="text-[9px] sm:text-[10px] font-black uppercase text-slate-400 mb-2 block tracking-widest italic font-bold">Link (Direto)</label><input name="link" defaultValue={editingComm?.link} className="w-full bg-slate-50 border-none rounded-xl sm:rounded-2xl p-4 sm:p-5 font-bold outline-none text-xs text-blue-500 shadow-sm" placeholder="https://..." /></div>
                                        <div><label className="text-[9px] sm:text-[10px] font-black uppercase text-slate-400 mb-2 block tracking-widest italic font-bold">STATUS</label><select name="status" defaultValue={editingComm?.status || 'Aguardando Envio'} className="w-full bg-slate-50 border-none rounded-xl sm:rounded-2xl p-4 sm:p-5 font-bold outline-none"><option>Aguardando Envio</option><option>Enviado</option><option>Cancelado</option></select></div>
                                    </div>
                                    <div className="space-y-6 sm:space-y-8">
                                        <div className="bg-[#FBFAF3] p-6 sm:p-10 rounded-[2rem] sm:rounded-[3rem] border border-[#F0EEE6] space-y-6 sm:space-y-8 shadow-inner text-center">
                                            <div className="text-[9px] sm:text-[10px] font-black uppercase text-[#397394] tracking-widest flex items-center justify-center gap-2 italic"><Icon name="bar-chart-3" size={14} /> Consolidação de Impacto</div>
                                            <div className="grid grid-cols-3 gap-3 sm:gap-4">
                                                <div className="space-y-2"><label className="text-[7px] sm:text-[8px] font-black uppercase text-[#8E97B0] block italic tracking-widest">Reach</label><input name="views" type="number" defaultValue={editingComm?.views || 0} className="w-full bg-white border border-slate-100 rounded-xl p-3 sm:p-4 font-black text-lg sm:text-xl text-center outline-none shadow-sm" /></div>
                                                <div className="space-y-2"><label className="text-[7px] sm:text-[8px] font-black uppercase text-[#8E97B0] block italic tracking-widest">Reações</label><input name="reactions" type="number" defaultValue={editingComm?.reactions || 0} className="w-full bg-white border border-slate-100 rounded-xl p-3 sm:p-4 font-black text-lg sm:text-xl text-center outline-none shadow-sm" /></div>
                                                <div className="space-y-2"><label className="text-[7px] sm:text-[8px] font-black uppercase text-[#8E97B0] block italic tracking-widest">Coments</label><input name="comments" type="number" defaultValue={editingComm?.comments || 0} className="w-full bg-white border border-slate-100 rounded-xl p-3 sm:p-4 font-black text-lg sm:text-xl text-center outline-none shadow-sm" /></div>
                                            </div>
                                            <div><label className="text-[8px] sm:text-[10px] font-black uppercase text-slate-400 mb-2 block tracking-widest italic">População Total (Base: 126)</label><input name="population" type="number" defaultValue={editingComm?.population || 126} className="w-full bg-white border-none rounded-xl sm:rounded-2xl p-4 font-black text-center outline-none" /></div>
                                        </div>
                                        <div className="space-y-4">
                                            <label className="text-[9px] sm:text-[10px] font-black uppercase text-slate-400 block tracking-widest italic font-bold text-center sm:text-left">Formatos (Flags)</label>
                                            <div className="grid grid-cols-3 gap-2 sm:gap-3">
                                                {FORMATOS.map(f => (
                                                    <div key={f} onClick={() => toggleFormat(f)} className={`p-3 sm:p-4 rounded-xl border-2 text-center text-[8px] sm:text-[10px] font-black uppercase cursor-pointer transition-all ${selectedFormats.includes(f) ? 'bg-[#397394] border-[#397394] text-white shadow-lg scale-105' : 'bg-white border-slate-50 text-slate-400 hover:border-slate-200'}`}>{f}</div>
                                                ))}
                                            </div>
                                        </div>
                                        <button type="submit" className="w-full py-5 sm:py-6 bg-black text-white rounded-2xl sm:rounded-[2rem] font-black uppercase text-[10px] sm:text-xs tracking-[0.3em] active:scale-[0.98] transition-all shadow-2xl shadow-black/20 italic">SALVAR E FECHAR</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* MODAL AGENDA RESPONSIVO */}
                    {isModalAgendaOpen && (
                        <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-[100] flex items-center justify-center p-2 sm:p-4">
                            <div className="bg-white w-full max-w-6xl rounded-[2.5rem] sm:rounded-[4rem] p-6 sm:p-12 shadow-2xl modal-animate relative max-h-[95vh] overflow-y-auto custom-scroll text-left">
                                <header className="mb-6 sm:mb-10 flex justify-between items-start sticky top-0 bg-white z-10 py-2 border-b border-slate-50 sm:border-none">
                                    <div className="pr-12"><h3 className="text-2xl sm:text-5xl font-black italic uppercase tracking-tighter leading-none">Novo Planeamento</h3><p className="hidden sm:block text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-2 ml-1 italic leading-loose">Mesa de Decisão Técnica e Governança Operacional</p></div>
                                    <button onClick={() => setIsModalAgendaOpen(false)} className="p-2 sm:p-3 bg-slate-50 rounded-full hover:text-red-500 transition-all active:scale-90 absolute right-0 top-0 sm:static"><Icon name="x" size={28} /></button>
                                </header>

                                <form onSubmit={handleSaveAgenda} className="grid grid-cols-1 lg:grid-cols-12 gap-6 sm:gap-10 items-start">
                                    <div className="lg:col-span-5 space-y-6 bg-slate-50 p-6 sm:p-10 rounded-[2rem] sm:rounded-[3rem] border border-slate-100 shadow-inner">
                                        <div className="space-y-2"><label className="text-[9px] sm:text-[10px] font-black uppercase text-slate-400 block tracking-widest italic font-bold">Atividade</label><input name="atividade" defaultValue={editingAgenda?.title} required className="w-full h-14 sm:h-16 bg-white border-none rounded-xl px-4 sm:px-6 font-bold text-slate-800 outline-none shadow-sm font-black italic uppercase text-sm sm:text-base" placeholder="Título da Pauta" /></div>
                                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                            <div className="space-y-2"><label className="text-[9px] sm:text-[10px] font-black uppercase text-slate-400 block tracking-widest italic font-bold text-slate-400">Data Prevista</label><input name="date" type="date" defaultValue={editingAgenda?.date} required className="w-full h-14 bg-white border-none rounded-xl px-4 font-bold outline-none text-slate-500 shadow-sm" /></div>
                                            <div className="space-y-2"><label className="text-[9px] sm:text-[10px] font-black uppercase text-slate-400 block tracking-widest italic font-bold">STATUS</label><select name="status" defaultValue={editingAgenda?.status || 'Agendado'} className="w-full h-14 bg-white border-none rounded-xl px-4 font-bold outline-none cursor-pointer shadow-sm"><option>Agendado</option><option>Realizado</option><option>Cancelado</option></select></div>
                                        </div>
                                        <div className="space-y-2"><label className="text-[9px] sm:text-[10px] font-black uppercase text-slate-400 block tracking-widest italic font-bold">Sponsor (Responsável)</label><input name="sponsor" defaultValue={editingAgenda?.sponsor} required className="w-full h-14 sm:h-16 bg-white border-none rounded-xl px-4 sm:px-6 font-bold outline-none shadow-sm" placeholder="Nome do Responsável" /></div>
                                        <div className="space-y-2"><label className="text-[9px] sm:text-[10px] font-black uppercase text-slate-400 block tracking-widest italic font-bold text-blue-500">Link Invite / Reunião</label><input name="inviteLink" defaultValue={editingAgenda?.inviteLink} className="w-full h-14 bg-white border-none rounded-xl px-4 font-bold outline-none text-xs italic text-blue-500 shadow-sm" placeholder="https://..." /></div>
                                        <div className="space-y-2"><label className="text-[9px] sm:text-[10px] font-black uppercase text-slate-400 block tracking-widest italic font-bold">Pauta Técnica (Descrição)</label><textarea name="description" defaultValue={editingAgenda?.description} className="w-full h-32 sm:h-40 bg-white border-none rounded-xl p-4 sm:p-8 font-medium text-slate-600 outline-none resize-none leading-relaxed text-sm shadow-sm" placeholder="Detalhes estratégicos..."></textarea></div>
                                    </div>

                                    <div className="lg:col-span-7 bg-slate-900 rounded-[2.5rem] sm:rounded-[4rem] p-6 sm:p-12 shadow-2xl flex flex-col justify-between self-stretch min-h-[500px] sm:min-h-[700px]">
                                        <div>
                                            <div className="flex justify-between items-center mb-8 sm:mb-10 border-b border-white/5 pb-6 sm:pb-8">
                                                <div className="text-[9px] sm:text-[10px] font-black uppercase text-white tracking-[0.3em] flex items-center gap-3 italic"><div className="w-2 sm:w-2.5 h-2 sm:h-2.5 rounded-full bg-amber-400 shadow-glow"></div> MESA DE DECISÃO</div>
                                                <div className="flex items-center gap-2 sm:gap-4 bg-white/5 p-2 sm:p-3 rounded-full border border-white/10 px-4 sm:px-6">
                                                    <span className="text-[8px] sm:text-[9px] font-black text-slate-500 uppercase tracking-tighter italic">Fornecedor?</span>
                                                    <button type="button" onClick={() => setVendorToggle(!vendorToggle)} className={`w-10 sm:w-14 h-5 sm:h-7 rounded-full relative transition-all duration-500 ${vendorToggle ? 'bg-[#BED993]' : 'bg-slate-700'}`}><div className={`absolute top-0.5 sm:top-1 left-1 w-4 sm:w-5 h-4 sm:h-5 rounded-full bg-white shadow-lg transition-all duration-500 ${vendorToggle ? 'translate-x-5 sm:translate-x-7' : ''}`}></div></button>
                                                </div>
                                            </div>

                                            {vendorToggle ? (
                                                <div className="space-y-4 sm:space-y-6 animate-in fade-in zoom-in duration-500">
                                                    {[0, 1, 2].map(i => (
                                                        <div key={i} onClick={() => setSelectedVendorIdx(i)} className={`card-decision p-4 sm:p-6 rounded-2xl sm:rounded-[2rem] bg-white/5 border-2 flex items-center gap-4 sm:gap-6 ${selectedVendorIdx === i ? 'border-[#BED993] bg-white/10 shadow-glow' : 'border-white/5 hover:border-white/10'}`}>
                                                            <div className={`w-10 sm:w-12 h-10 sm:h-12 rounded-xl sm:rounded-2xl flex items-center justify-center font-black text-xs ${selectedVendorIdx === i ? 'bg-[#BED993] text-emerald-950' : 'bg-white/10 text-white/20'}`}>0{i+1}</div>
                                                            <input name={`v${i+1}`} defaultValue={editingAgenda?.[`vendor${i+1}`]} placeholder={`Fornecedor ${i+1}`} className="flex-1 bg-transparent border-none text-sm sm:text-base font-extrabold outline-none text-white placeholder:text-white/10" onClick={(e) => e.stopPropagation()} />
                                                            <div className={`px-3 sm:px-5 py-2 sm:py-2.5 rounded-lg sm:rounded-xl font-black uppercase text-[7px] sm:text-[8px] transition-all tracking-widest ${selectedVendorIdx === i ? 'bg-[#BED993] text-emerald-950 shadow-lg' : 'bg-white/10 text-slate-400'}`}>{selectedVendorIdx === i ? 'ELEITO' : 'ELEGER'}</div>
                                                        </div>
                                                    ))}
                                                </div>
                                            ) : (
                                                <div className="h-[300px] sm:h-[450px] flex flex-col items-center justify-center text-center opacity-20 border border-dashed border-white/20 rounded-[2rem] sm:rounded-[3rem] p-6"><Icon name="users" size={48} className="mb-4 sm:mb-8 text-white" /><h4 className="font-black uppercase text-xs sm:text-sm text-white tracking-[0.4em]">USO INTERNO ATIVADO</h4><p className="text-[8px] sm:text-[9px] font-bold text-white uppercase mt-2 sm:mt-4 tracking-widest italic leading-loose text-center">Este evento será executado integralmente por recursos próprios.</p></div>
                                            )}
                                        </div>
                                        <div className="mt-8 sm:mt-12"><button type="submit" className="w-full h-20 sm:h-24 bg-white text-black hover:bg-slate-100 rounded-2xl sm:rounded-[2.5rem] font-black uppercase text-[10px] sm:text-xs tracking-[0.3em] sm:tracking-[0.4em] shadow-2xl active:scale-[0.98] transition-all flex items-center justify-center gap-5 italic shadow-white/5">CONFIRMAR E SALVAR</button></div>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    <footer className="fixed bottom-0 w-full bg-white/95 backdrop-blur-md border-t border-slate-100 px-6 sm:px-10 py-4 sm:py-5 flex flex-col sm:flex-row justify-between items-center text-[8px] sm:text-[9px] text-slate-300 font-black uppercase tracking-[0.3em] sm:tracking-[0.4em] z-40 shadow-inner gap-2">
                        <div className="flex items-center gap-3">
                            <div className={`w-2 h-2 rounded-full ${user ? 'bg-green-500 shadow-[0_0_10px_rgba(34,197,94,0.3)]' : 'bg-red-500 animate-pulse'}`}></div>
                            <span>© 2026 Unico Ops. Todos os direitos reservados.</span>
                        </div>
                        <div className="flex gap-6 sm:gap-10 items-center italic">
                            {fb.firebaseConfig && <span className="hidden sm:inline opacity-40 uppercase tracking-tighter">Instância: {fb.firebaseConfig.projectId}</span>}
                            <span>Sincronização em Tempo Real Ativa</span>
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
