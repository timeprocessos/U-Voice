<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>U-Voice | Hub de Operações</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #FDFDFE; margin: 0; padding: 0; overflow-x: hidden; }
        
        .custom-scroll::-webkit-scrollbar { width: 4px; height: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #E2E8F0; border-radius: 10px; }
        
        .modal-animate { animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .impact-filter { background: white; border: 1px solid #F1F5F9; border-radius: 12px; padding: 8px 16px; font-size: 10px; font-weight: 900; text-transform: uppercase; color: #1e293b; outline: none; transition: all 0.2s; cursor: pointer; }
        .impact-filter:hover { border-color: #CBD5E1; }
        
        .row-green-effect { border-left: 4px solid #BED993 !important; background: linear-gradient(90deg, rgba(190, 217, 147, 0.05) 0%, rgba(255, 255, 255, 0) 100%); }
        input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        
        .btn-close-modal { 
            position: absolute; top: 1.5rem; right: 1.5rem; background: #000; color: #fff; 
            width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; 
            justify-content: center; z-index: 170; transition: all 0.2s; 
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2); border: 2px solid rgba(255,255,255,0.1); cursor: pointer; 
        }
        .btn-close-modal:hover { transform: scale(1.1) rotate(90deg); background: #ef4444; }

        .checkbox-flag { display: flex; align-items: center; gap: 8px; padding: 8px 16px; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 12px; cursor: pointer; transition: all 0.2s; font-size: 11px; font-weight: 700; text-transform: uppercase; }
        .checkbox-flag.active { background: #397394; color: white; border-color: #397394; }
        
        .status-pill { padding: 4px 12px; border-radius: 99px; font-size: 9px; font-weight: 900; text-transform: uppercase; display: inline-block; }
        .status-sent { background: #ecfdf5; color: #059669; }
        .status-pending { background: #fef3c7; color: #d97706; }
        .status-canceled { background: #fef2f2; color: #dc2626; }
        
        .card-decision { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); border: 2px solid transparent; cursor: pointer; }
        .message-box { position: fixed; bottom: 85px; left: 50%; transform: translateX(-50%); background: #1e293b; color: white; padding: 12px 24px; border-radius: 12px; z-index: 200; font-weight: 900; font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; box-shadow: 0 20px 40px rgba(0,0,0,0.3); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, onSnapshot, deleteDoc, addDoc, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Configuração do Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyCRNpfVN3n_Ue9kocKSU7EGlp9ElBJWvRg",
            authDomain: "u-voice-82837.firebaseapp.com",
            projectId: "u-voice-82837",
            storageBucket: "u-voice-82837.firebasestorage.app",
            messagingSenderId: "363918476944",
            appId: "1:363918476944:web:02fe7e523c4eed24abba15"
        };

        const firebaseApp = initializeApp(firebaseConfig);
        const auth = getAuth(firebaseApp);
        const db = getFirestore(firebaseApp);
        const APP_ID_ROOT = 'u-voice-v26-gold';

        const { useState, useEffect, useMemo, useRef } = React;

        // --- CONSTANTES ---
        const EDITORIAS_LIST = ["Originais Unico", "Career Ops", "The Ops Playbook", "The Ops Story"];
        const FORMATOS_LIST = ["Vídeo", "Imagem", "GIF", "Texto", "Slide", "PDF"];
        const STATUS_OPTIONS = ["Aguardando Envio", "Enviado", "Cancelado"];
        const MESES_MAP = [
            { label: "Janeiro", val: "0" }, { label: "Fevereiro", val: "1" }, { label: "Março", val: "2" },
            { label: "Abril", val: "3" }, { label: "Maio", val: "4" }, { label: "Junho", val: "5" },
            { label: "Julho", val: "6" }, { label: "Agosto", val: "7" }, { label: "Setembro", val: "8" },
            { label: "Outubro", val: "9" }, { label: "Novembro", val: "10" }, { label: "Dezembro", val: "11" }
        ];
        const MESES_ABREV = ["JAN", "FEV", "MAR", "ABR", "MAI", "JUN", "JUL", "AGO", "SET", "OUT", "NOV", "DEZ"];
        const ANALYSTS_LIST = ["Ariel Mori Dell Aringa", "Diego Francisco Rocha"];
        const CHANNELS_LIST = ["#news-ops-all-team", "#news-cx-team", "#news-analysis-team", "#news-onboarding-team", "#news-ops-leaders"];

        // --- COMPONENTES AUXILIARES ---
        const Icon = ({ name, size = 18, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    window.lucide.createIcons({ attrs: { class: className, style: `width: ${size}px; height: ${size}px;` }, name: name });
                }
            }, [name, size, className]);
            return <span ref={iconRef} className="inline-flex items-center justify-center"><i data-lucide={name}></i></span>;
        };

        const UnicoLogo = ({ size = 34 }) => (
            <div className="bg-black rounded-xl flex items-center justify-center shadow-lg" style={{ width: size, height: size }}>
                <svg width={size * 0.6} height={size * 0.6} viewBox="0 0 100 100" fill="none">
                    <path d="M20 20V55C20 71.5685 33.4315 85 50 85C66.5685 85 80 71.5685 80 55V20H65V55C65 63.2843 58.2843 70 50 70C41.7157 70 35 63.2843 35 55V20H20Z" fill="white"/>
                </svg>
            </div>
        );

        function SimpleBarChart({ data, title, color = "#397394" }) {
            const maxVal = Math.max(...Object.values(data), 1);
            return (
                <div className="bg-white p-8 rounded-[2.5rem] border border-slate-100 shadow-sm w-full text-left">
                    <h4 className="text-[10px] font-black uppercase text-slate-400 mb-6 tracking-widest italic">{title}</h4>
                    <div className="space-y-4">
                        {Object.entries(data).map(([key, val]) => (
                            <div key={key} className="space-y-1">
                                <div className="flex justify-between text-[8px] font-black uppercase text-slate-500"><span>{key}</span><span>{val}</span></div>
                                <div className="h-2 bg-slate-50 rounded-full overflow-hidden"><div className="h-full rounded-full transition-all duration-1000" style={{ width: `${(val/maxVal)*100}%`, backgroundColor: color }}></div></div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        function LineAreaChart({ data, title, color = "#397394", valueSuffix = "" }) {
            const chartHeight = 220; const chartWidth = 800;
            const paddingX = 40; const paddingY = 60;
            const values = Object.values(data);
            const maxVal = Math.max(...values, 1) * 1.2;
            const keys = Object.keys(data);
            const points = keys.map((key, i) => {
                const x = (i * (chartWidth - paddingX * 2)) / (keys.length - 1) + paddingX;
                const y = chartHeight - ((data[key] / maxVal) * (chartHeight - paddingY * 2)) - paddingY;
                return { x, y, val: data[key], label: key };
            });
            const linePath = points.map((p, i) => `${i === 0 ? 'M' : 'L'} ${p.x} ${p.y}`).join(' ');
            const areaPath = `${linePath} L ${points[points.length-1].x} ${chartHeight - paddingY} L ${points[0].x} ${chartHeight - paddingY} Z`;
            return (
                <div className="bg-white p-8 rounded-[3rem] border border-slate-100 shadow-sm w-full transition-all">
                    <h4 className="text-[11px] font-black uppercase text-slate-400 mb-8 tracking-[0.2em] italic">{title}</h4>
                    <div className="relative w-full overflow-x-auto custom-scroll pb-4">
                        <svg viewBox={`0 0 ${chartWidth} ${chartHeight}`} className="w-full min-w-[600px] h-auto overflow-visible">
                            {[0, 0.5, 1].map((p, i) => (<line key={i} x1={paddingX} y1={chartHeight - paddingY - p * (chartHeight - paddingY * 2)} x2={chartWidth - paddingX} y2={chartHeight - paddingY - p * (chartHeight - paddingY * 2)} stroke="#F1F5F9" strokeWidth="1.5" strokeDasharray="4 4" />))}
                            <path d={areaPath} fill={color} fillOpacity="0.05" /><path d={linePath} fill="none" stroke={color} strokeWidth="4" strokeLinecap="round" strokeLinejoin="round" />
                            {points.map((p, i) => (
                                <g key={i}>
                                    <circle cx={p.x} cy={p.y} r="6" fill="white" stroke={color} strokeWidth="4" />
                                    <text x={p.x} y={p.y - 22} textAnchor="middle" className="font-black" style={{ fontSize: '14px', fill: '#1e293b' }}>{p.val}{valueSuffix}</text>
                                    <text x={p.x} y={chartHeight - 15} textAnchor="middle" className="font-bold text-slate-400 uppercase" style={{ fontSize: '9px' }}>{p.label}</text>
                                </g>
                            ))}
                        </svg>
                    </div>
                </div>
            );
        }

        // --- APP PRINCIPAL ---
        function App() {
            // Estados Fundamentais
            const [user, setUser] = useState(null);
            const [activeTab, setActiveTab] = useState('comunicados');
            const [comms, setComms] = useState([]);
            const [agenda, setAgenda] = useState([]);
            const [message, setMessage] = useState("");
            
            // Estados de Interface e Modais
            const [isModalCommOpen, setIsModalCommOpen] = useState(false);
            const [isModalAgendaOpen, setIsModalAgendaOpen] = useState(false);
            const [editingComm, setEditingComm] = useState(null);
            const [editingAgenda, setEditingAgenda] = useState(null);

            // Estados de Formulário
            const [channelsList, setChannelsList] = useState(CHANNELS_LIST);
            const [selectedAnalysts, setSelectedAnalysts] = useState([]);
            const [selectedFormats, setSelectedFormats] = useState([]);
            const [localBudget, setLocalBudget] = useState(0);
            const [hasCoffee, setHasCoffee] = useState(false);
            const [vendorToggle, setVendorToggle] = useState(false);
            const [selectedVendorIdx, setSelectedVendorIdx] = useState(null);
            const [localVendors, setLocalVendors] = useState([{ name: '', value: 0 }, { name: '', value: 0 }, { name: '', value: 0 }]);

            // Filtros Dinâmicos (Aba Comunicados)
            const [filterAnalyst, setFilterAnalyst] = useState("Todos");
            const [filterYear, setFilterYear] = useState("2026");
            const [filterMonth, setFilterMonth] = useState("Todos");
            const [filterChannel, setFilterChannel] = useState("Todos Canais");
            const [filterEditoria, setFilterEditoria] = useState("Todas");

            // 1. Inicialização de Autenticação e Dados
            useEffect(() => {
                const initAuth = async () => {
                    try {
                        await signInAnonymously(auth);
                    } catch (e) {
                        console.error("Firebase auth error:", e);
                    }
                };
                initAuth();
                const unsubscribeAuth = onAuthStateChanged(auth, (u) => {
                    setUser(u);
                    if (u) setMessage("U-Voice Gold Conectado");
                });
                return () => unsubscribeAuth();
            }, []);

            // 2. Sincronização em Tempo Real (Blindagem contra Permission Error)
            useEffect(() => {
                if (!user) return;
                
                const unsubC = onSnapshot(collection(db, 'artifacts', APP_ID_ROOT, 'public', 'data', 'comms'), 
                    (snap) => setComms(snap.docs.map(d => ({ id: d.id, ...d.data() }))),
                    (err) => console.error("Firestore Error Comms:", err)
                );
                
                const unsubA = onSnapshot(collection(db, 'artifacts', APP_ID_ROOT, 'public', 'data', 'agenda'), 
                    (snap) => setAgenda(snap.docs.map(d => ({ id: d.id, ...d.data() }))),
                    (err) => console.error("Firestore Error Agenda:", err)
                );
                
                return () => { unsubC(); unsubA(); };
            }, [user]);

            // --- LÓGICA DE NEGÓCIO ---
            const calculateScore = (reactions = 0, comments = 0, population = 126) => {
                if (!population || population === 0) return 0;
                return ((((Number(reactions) * 1) + (Number(comments) * 2)) / Number(population)) * 100).toFixed(1);
            };

            const toggleAnalyst = (name) => setSelectedAnalysts(prev => prev.includes(name) ? prev.filter(n => n !== name) : [...prev, name]);
            const toggleFormat = (f) => setSelectedFormats(prev => prev.includes(f) ? prev.filter(item => item !== f) : [...prev, f]);

            const handleSaveComm = async (e) => {
                e.preventDefault();
                if (!user) return;
                const fd = new FormData(e.target);
                const data = {
                    title: fd.get('title'), 
                    channelName: fd.get('channelName'),
                    date: fd.get('date'), 
                    postTime: fd.get('postTime'), 
                    editoria: fd.get('editoria'),
                    analysts: selectedAnalysts, 
                    formats: selectedFormats, 
                    medium: fd.get('medium') || 'Slack', 
                    status: fd.get('status'),
                    population: Number(fd.get('population') || 126), 
                    views: Number(fd.get('views') || 0),
                    reactions: Number(fd.get('reactions') || 0), 
                    comments: Number(fd.get('comments') || 0), 
                    updatedAt: new Date().toISOString()
                };

                setIsModalCommOpen(false);
                try {
                    if (editingComm) await updateDoc(doc(db, 'artifacts', APP_ID_ROOT, 'public', 'data', 'comms', editingComm.id), data);
                    else await addDoc(collection(db, 'artifacts', APP_ID_ROOT, 'public', 'data', 'comms'), data);
                    setMessage("Sucesso! Comunicado salvo.");
                } catch (err) { setMessage("Erro ao gravar dados."); }
            };

            const openCommModal = (c = null) => {
                setEditingComm(c);
                setSelectedAnalysts(c ? (c.analysts || []) : []);
                setSelectedFormats(c ? (c.formats || []) : []);
                setIsModalCommOpen(true);
            };

            const openAgendaModal = (ev = null) => {
                if (ev) {
                    setEditingAgenda(ev); setLocalBudget(Number(ev.budget || 0)); setHasCoffee(ev.hasCoffee || false);
                    setVendorToggle(ev.hasVendor || false); setSelectedVendorIdx(ev.selectedVendorIdx >= 0 ? ev.selectedVendorIdx : null);
                    setLocalVendors([
                        { name: ev.vendor1 || '', value: Number(ev.vendorValue1 || 0) },
                        { name: ev.vendor2 || '', value: Number(ev.vendorValue2 || 0) },
                        { name: ev.vendor3 || '', value: Number(ev.vendorValue3 || 0) }
                    ]);
                } else {
                    setEditingAgenda(null); setLocalBudget(0); setHasCoffee(false); setVendorToggle(false); setSelectedVendorIdx(null);
                    setLocalVendors([{ name: '', value: 0 }, { name: '', value: 0 }, { name: '', value: 0 }]);
                }
                setIsModalAgendaOpen(true);
            };

            const handleSaveAgenda = async (e) => {
                e.preventDefault();
                if (!user) return;
                const fd = new FormData(e.target);
                const data = {
                    title: fd.get('atividade'), date: fd.get('date'), sponsor: fd.get('sponsor'), description: fd.get('description'),
                    status: fd.get('status'), budget: localBudget, hasCoffee: hasCoffee, hasVendor: vendorToggle,
                    selectedVendorIdx: selectedVendorIdx !== null ? selectedVendorIdx : -1,
                    vendor1: localVendors[0].name, vendorValue1: localVendors[0].value,
                    vendor2: localVendors[1].name, vendorValue2: localVendors[1].value,
                    vendor3: localVendors[2].name, vendorValue3: localVendors[2].value, updatedAt: new Date().toISOString()
                };
                setIsModalAgendaOpen(false);
                try {
                    if (editingAgenda) await updateDoc(doc(db, 'artifacts', APP_ID_ROOT, 'public', 'data', 'agenda', editingAgenda.id), data);
                    else await addDoc(collection(db, 'artifacts', APP_ID_ROOT, 'public', 'data', 'agenda'), data);
                    setMessage("Agenda atualizada!");
                } catch (err) { setMessage("Erro ao salvar."); }
            };

            // Memos para Filtros e Impacto
            const filteredComms = useMemo(() => {
                return comms.filter(c => {
                    const d = new Date(c.date);
                    const analystMatch = filterAnalyst === "Todos" || (c.analysts && c.analysts.includes(filterAnalyst));
                    const yearMatch = d.getFullYear().toString() === filterYear;
                    const monthMatch = filterMonth === "Todos" || d.getMonth().toString() === filterMonth;
                    const channelMatch = filterChannel === "Todos Canais" || c.channelName === filterChannel;
                    const editoriaMatch = filterEditoria === "Todas" || c.editoria === filterEditoria;
                    return analystMatch && yearMatch && monthMatch && channelMatch && editoriaMatch;
                });
            }, [comms, filterAnalyst, filterYear, filterMonth, filterChannel, filterEditoria]);

            const statsImpacto = useMemo(() => {
                // REGRA SÊNIOR: APENAS POSTS ENVIADOS CONTAM PARA O IMPACTO
                const sent = comms.filter(c => {
                    const d = new Date(c.date);
                    return c.status === 'Enviado' && d.getFullYear().toString() === filterYear && (filterChannel === "Todos Canais" || c.medium === filterChannel);
                });

                const totalPosts = sent.length;
                const interactions = sent.reduce((acc, c) => acc + (Number(c.reactions) || 0) + (Number(c.comments) || 0), 0);
                const totalComments = sent.reduce((acc, c) => acc + (Number(c.comments) || 0), 0);
                const scoreSum = sent.reduce((acc, c) => acc + Number(calculateScore(c.reactions, c.comments, c.population)), 0);
                const avgScore = totalPosts > 0 ? (scoreSum / totalPosts).toFixed(1) : "0.0";
                
                const formatDist = FORMATOS_LIST.reduce((acc, f) => { acc[f] = sent.filter(c => c.formats?.includes(f)).length; return acc; }, {});
                const editoriaDist = EDITORIAS_LIST.reduce((acc, ed) => { acc[ed] = sent.filter(c => c.editoria === ed).length; return acc; }, {});
                
                const monthlyPosts = {}; const monthlyEngagement = {};
                MESES_ABREV.forEach((mes, idx) => {
                    const mPosts = sent.filter(c => new Date(c.date).getMonth() === idx);
                    monthlyPosts[mes] = mPosts.length;
                    if (mPosts.length > 0) monthlyEngagement[mes] = (mPosts.reduce((acc, c) => acc + Number(calculateScore(c.reactions, c.comments, c.population)), 0) / mPosts.length).toFixed(1);
                    else monthlyEngagement[mes] = 0;
                });
                return { totalPosts, interactions, totalComments, avgScore, formatDist, editoriaDist, monthlyPosts, monthlyEngagement };
            }, [comms, filterYear, filterChannel]);

            return (
                <div className="min-h-screen pb-32">
                    {message && <div className="message-box" onClick={() => setMessage("")}>{message}</div>}
                    
                    <nav className="bg-white border-b px-4 sm:px-10 py-5 flex justify-between items-center sticky top-0 z-50 shadow-sm">
                        <div className="flex items-center gap-3"><UnicoLogo size={42} /><h1 className="text-xl sm:text-2xl font-black italic uppercase tracking-tighter leading-none">U-Voice</h1></div>
                        <div className="flex bg-slate-100 p-1 rounded-full gap-1 overflow-x-auto max-w-full">
                            {['comunicados', 'agenda', 'impacto'].map(tab => (
                                <button key={tab} onClick={() => setActiveTab(tab)} className={`px-6 py-2.5 rounded-full text-[9px] sm:text-[10px] font-black uppercase transition-all whitespace-nowrap ${activeTab === tab ? 'bg-black text-white shadow-lg' : 'text-slate-400 hover:text-slate-600'}`}>{tab}</button>
                            ))}
                        </div>
                    </nav>

                    <main className="max-w-7xl mx-auto px-6 sm:px-10 py-10 text-left">
                        <header className="mb-12">
                            <h2 className="text-5xl sm:text-8xl font-black italic tracking-tighter leading-tight text-slate-900 uppercase">
                                {activeTab === 'comunicados' ? 'flow.feed' : activeTab === 'agenda' ? 'next.steps' : 'impact.metrics'}
                            </h2>
                            <p className="text-slate-400 font-black uppercase text-[10px] sm:text-xs tracking-[0.4em] mt-4 ml-1 italic leading-none text-slate-400">Gestão Estratégica Operacional</p>
                        </header>

                        {/* ÁREA AMARELA: FILTROS DINÂMICOS */}
                        {activeTab === 'comunicados' && (
                            <div className="flex flex-wrap items-center gap-3 mb-10 bg-white p-4 rounded-2xl border border-slate-100 shadow-sm sticky top-[85px] z-40">
                                <div className="flex items-center gap-2 px-4 py-2 bg-slate-50 rounded-xl text-slate-400 border border-slate-100">
                                    <Icon name="filter" size={14} /><span className="text-[10px] font-black uppercase">Filtros</span>
                                </div>
                                <select value={filterAnalyst} onChange={(e) => setFilterAnalyst(e.target.value)} className="impact-filter"><option>Todos</option>{ANALYSTS_LIST.map(a => <option key={a}>{a}</option>)}</select>
                                <select value={filterYear} onChange={(e) => setFilterYear(e.target.value)} className="impact-filter"><option>2025</option><option>2026</option></select>
                                <select value={filterMonth} onChange={(e) => setFilterMonth(e.target.value)} className="impact-filter"><option value="Todos">Todos Meses</option>{MESES_MAP.map(m => <option key={m.val} value={m.val}>{m.label}</option>)}</select>
                                <select value={filterChannel} onChange={(e) => setFilterChannel(e.target.value)} className="impact-filter"><option>Todos Canais</option>{channelsList.map(c => <option key={c}>{c}</option>)}</select>
                                <select value={filterEditoria} onChange={(e) => setFilterEditoria(e.target.value)} className="impact-filter"><option>Todas</option>{EDITORIAS_LIST.map(e => <option key={e}>{e}</option>)}</select>
                                <button onClick={() => {setFilterAnalyst("Todos"); setFilterYear("2026"); setFilterMonth("Todos"); setFilterChannel("Todos Canais"); setFilterEditoria("Todas");}} className="ml-auto text-[10px] font-black uppercase text-red-400 hover:text-red-500">Limpar</button>
                            </div>
                        )}

                        {activeTab === 'comunicados' && (
                            <section className="animate-in fade-in duration-500">
                                <div className="flex justify-between items-center mb-10"><h3 className="text-2xl font-black uppercase italic tracking-tighter">Fluxo de Posts</h3><button onClick={() => openCommModal()} className="bg-[#397394] text-white px-8 py-4 rounded-2xl text-[10px] font-black uppercase flex items-center gap-2 shadow-xl hover:bg-[#2d5c78] transition-all"><Icon name="plus" size={14} /> Novo Comunicado</button></div>
                                <div className="bg-white rounded-[3rem] border border-slate-100 overflow-hidden shadow-sm overflow-x-auto text-slate-700">
                                    <table className="w-full text-left min-w-[900px]">
                                        <thead className="bg-slate-50 border-b text-slate-400 text-[10px] font-black uppercase tracking-widest italic text-left">
                                            <tr><th className="px-10 py-6">Item / Editoria</th><th className="px-10 py-6 text-center">Data / Status</th><th className="px-10 py-6 text-center">Analistas / Canal</th><th className="px-10 py-6 text-right">Score</th><th className="px-10 py-6 w-32"></th></tr>
                                        </thead>

                                            <div className="grid grid-cols-3 gap-4 text-left"><div className="space-y-2 text-center text-slate-800 text-left"><label className="text-[8px] uppercase text-[#8E97B0] block italic text-center text-slate-400 uppercase">Reach</label><input name="views" type="number" defaultValue={editingComm?.views || 0} className="w-full bg-white border border-slate-100 rounded-xl p-4 font-black text-xl text-center outline-none shadow-sm text-slate-800" /></div><div className="space-y-2 text-center text-slate-800 text-left"><label className="text-[8px] uppercase text-[#8E97B0] block italic text-center text-slate-400 uppercase">Reações</label><input name="reactions" type="number" defaultValue={editingComm?.reactions || 0} className="w-full bg-white border border-slate-100 rounded-xl p-4 font-black text-xl text-center outline-none shadow-sm text-slate-800" /></div><div className="space-y-2 text-center text-slate-800 text-left"><label className="text-[8px] uppercase text-[#8E97B0] block italic text-center text-slate-400 uppercase">Coments</label><input name="comments" type="number" defaultValue={editingComm?.comments || 0} className="w-full bg-white border border-slate-100 rounded-xl p-4 font-black text-xl text-center outline-none shadow-sm text-slate-800" /></div></div>

                                            <div className="space-y-2 text-left text-slate-800 text-left text-left text-left"><label className="text-[10px] font-black uppercase text-slate-400 block font-bold text-slate-400 uppercase text-left text-left text-left">STATUS</label><select name="status" defaultValue={editingAgenda?.status || 'Agendado'} className="w-full h-14 bg-white border-none rounded-xl px-4 font-bold outline-none cursor-pointer shadow-sm text-slate-700 text-left"><option>Agendado</option><option>Realizado</option><option>Cancelado</option></select></div>
                                        </div>
                                        <div className="space-y-2 text-left uppercase text-slate-800 text-left text-left text-left text-left text-left"><label className="text-[10px] font-black uppercase text-slate-400 block font-bold uppercase text-slate-400 text-left">Sponsor Responsável</label><input name="sponsor" defaultValue={editingAgenda?.sponsor} required className="w-full h-14 bg-white border-none rounded-xl px-6 font-bold outline-none shadow-sm text-slate-800 text-left" /></div>

                                        <div className="space-y-2 text-left text-slate-800 uppercase text-slate-800 text-left text-left text-left text-left text-left"><label className="text-[10px] font-black uppercase text-slate-400 block font-bold uppercase text-slate-400 text-left">Pauta Técnica</label><textarea name="description" defaultValue={editingAgenda?.description} className="w-full h-40 bg-white border-none rounded-xl p-8 font-medium text-slate-600 outline-none resize-none leading-relaxed text-sm shadow-sm text-slate-600 text-left" placeholder="Detalhes estratégicos..."></textarea></div>
                                    </div>

                                                        return (
                                                            <div key={i} onClick={() => setSelectedVendorIdx(i)} className={`card-decision p-6 rounded-[2rem] bg-white/5 border-2 flex flex-col gap-4 ${selectedVendorIdx === i ? 'border-[#BED993] bg-white/10 shadow-glow-green scale-[1.02]' : 'border-white/5 hover:border-white/10'}`}>
                                                                <div className="flex items-center gap-6 text-left text-left text-left text-left text-left text-left text-left text-left"><div className={`w-12 h-12 rounded-2xl flex items-center justify-center font-black text-xs ${selectedVendorIdx === i ? 'bg-[#BED993] text-emerald-950' : 'bg-white/10 text-white/20'}`}>0{i+1}</div><input placeholder={`NOME DO FORNECEDOR ${i+1}`} value={localVendors[i].name} onChange={(e) => { const n = [...localVendors]; n[i].name = e.target.value; setLocalVendors(n); }} className="flex-1 bg-transparent border-none text-base font-extrabold outline-none text-white placeholder:text-white/10 uppercase shadow-none text-left text-left text-left text-left text-left text-left text-left text-left" onClick={(e) => e.stopPropagation()} /><div className={`px-5 py-2.5 rounded-xl font-black uppercase text-[8px] transition-all tracking-widest ${selectedVendorIdx === i ? 'bg-[#BED993] text-emerald-950 shadow-lg font-black' : 'bg-white/10 text-slate-400'}`}>{selectedVendorIdx === i ? 'ELEITO' : 'ELEGER'}</div></div>
                                                                <div className="flex items-center justify-between pl-18 text-left text-white text-left text-left text-left text-left text-left text-left text-left text-left text-left"><div className="flex items-center gap-3 text-left text-white text-left text-left text-left text-left text-left text-left text-left text-left text-left"><span className="text-[9px] font-black text-slate-500 uppercase tracking-widest italic text-slate-400 text-left text-white text-left text-left">Custo: R$</span><input type="number" step="0.01" value={localVendors[i].value} onChange={(e) => { const n = [...localVendors]; n[i].value = Number(e.target.value); setLocalVendors(n); }} className="bg-transparent border-none text-xl font-black text-emerald-400 outline-none w-32 shadow-none text-white text-left text-left text-left text-left text-left text-left text-left text-left text-left" onClick={(e) => e.stopPropagation()} /></div><div className="text-right flex flex-col items-end text-white text-right text-white text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left"><span className="text-[8px] font-black text-blue-400 uppercase block tracking-widest opacity-60 italic mb-0.5 text-blue-300 text-left text-left text-left text-left text-left text-left">Diferença / %</span><span className={`text-xs font-black px-3 py-1 rounded-lg ${isOver ? 'bg-red-500/10 text-red-400' : 'bg-blue-500/10 text-blue-400'}`}>{isOver ? '+' : ''}{diff.toLocaleString('pt-BR')} ({percent}%)</span></div></div>
                                                            </div>
                                                        );
                                                    })}
                                                </div>
                                            ) : (<div className="h-[450px] flex flex-col items-center justify-center text-center opacity-20 border border-dashed border-white/20 rounded-[3rem] p-6 text-white text-center text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left"><Icon name="users" size={48} className="mb-8 text-white" /><h4 className="font-black uppercase text-sm text-white tracking-[0.4em] text-white text-left">USO INTERNO ATIVADO</h4><p className="text-[9px] font-bold text-white uppercase mt-4 tracking-widest italic leading-loose text-center px-10 text-white italic text-left text-left text-left text-left text-left text-left text-left text-left text-left">Recursos operacionais próprios alocados.</p></div>)}
                                        </div>
                                        <div className="mt-12 text-slate-900 text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left"><button type="submit" className="w-full h-24 bg-white text-black hover:bg-slate-100 rounded-[2.5rem] font-black uppercase text-xs tracking-[0.3em] shadow-2xl active:scale-[0.98] transition-all flex items-center justify-center gap-5 italic shadow-white/5 font-black uppercase italic text-slate-900 text-center"><Icon name="check-circle-2" size={22} /> CONFIRMAR E SALVAR TUDO</button></div>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    <footer className="fixed bottom-0 w-full bg-white/95 backdrop-blur-md border-t border-slate-100 px-6 sm:px-10 py-5 flex flex-col sm:flex-row justify-between items-center text-[8px] sm:text-[9px] text-slate-300 font-black uppercase tracking-[0.4em] z-40 shadow-inner gap-2">
                        <div className="flex items-center gap-3 text-slate-400 text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left"><div className={`w-2.5 h-2.5 rounded-full ${user ? 'bg-green-500 shadow-[0_0_12px_rgba(34,197,94,0.3)]' : 'bg-red-500 animate-pulse'}`}></div><span>© 2026 Unico Ops. Todos os direitos reservados.</span></div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
